<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人员管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0eeea;
  --border: rgba(30,30,30,0.1); --border2: rgba(30,30,30,0.18);
  --text: #1a1a1a; --text2: #5a5a5a; --text3: #999;
  --accent: #1F4E79; --accent2: #2E75B6; --accent-light: #e8f0f8; --accent-mid: #b8d0ea;
  --green: #2d6a4f; --green-bg: #e8f5ee;
  --amber: #92400e; --amber-bg: #fef3c7;
  --red: #9b1c1c; --red-bg: #fee2e2;
  --purple: #7c3aed; --purple-bg: #f3e8ff;
  --teal: #0e7490; --teal-bg: #e0f2fe;
  --shadow: 0 2px 12px rgba(0,0,0,0.07); --shadow2: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px; --radius-sm: 8px;
  --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --surface2: #283548;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  --accent: #2563eb; --accent2: #60a5fa; --accent-light: #1e3252; --accent-mid: rgba(96,165,250,0.2);
  --green: #4ade80; --green-bg: #052e16;
  --amber: #fbbf24; --amber-bg: #1c1400;
  --red: #f87171; --red-bg: #2d0000;
  --purple: #a78bfa; --purple-bg: #1e1045;
  --teal: #22d3ee; --teal-bg: #083344;
  --shadow: 0 2px 12px rgba(0,0,0,0.4); --shadow2: 0 8px 32px rgba(0,0,0,0.5);
}
[data-theme="dark"] .sidebar { background: #1e3252; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

/* ======== LAYOUT ======== */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--accent); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
.sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.12); }
.sidebar-logo h1 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; letter-spacing: 0.3px; line-height: 1.3; color: #fff; }
.sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; letter-spacing: 0.8px; text-transform: uppercase; }
.sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; cursor: pointer; color: rgba(255,255,255,0.65); font-size: 13.5px; transition: color 0.2s, background 0.2s, border-left-color 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-item.active { color: #fff; background: rgba(255,255,255,0.12); border-left-color: rgba(255,255,255,0.7); }
.nav-icon { width: 18px; height: 18px; opacity: 0.9; flex-shrink: 0; }
.sidebar-switch { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.12); display: flex; flex-direction: column; gap: 4px; }
.switch-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius-sm); font-size: 12.5px; color: rgba(255,255,255,0.55); text-decoration: none; transition: all 0.2s; cursor: pointer; }
.switch-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 11px; color: rgba(255,255,255,0.4); }
.sidebar-footer span { cursor: pointer; transition: color 0.2s; }
.sidebar-footer span:hover { color: rgba(255,255,255,0.8); }

/* ======== MAIN ======== */
.main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
.topbar-title { font-size: 17px; font-weight: 500; }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.content { flex: 1; overflow-y: auto; }

/* ======== BUTTONS ======== */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text); transition: all 0.2s; font-weight: 500; }
.btn:hover { background: var(--surface2); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { box-shadow: 0 4px 14px rgba(31,78,121,0.3); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }
.btn-ghost { border: none; background: none; padding: 6px 10px; }
.btn-ghost:hover { background: var(--surface2); box-shadow: none; transform: none; }

/* ======== STATS BAR ======== */
.stats-bar { display: flex; gap: 16px; padding: 20px 32px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
.stat-card { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); min-width: 140px; transition: var(--transition); }
.stat-card:hover { border-color: var(--accent-mid); }
.stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-num { font-size: 20px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ======== FILTER BAR ======== */
.filter-bar { display: flex; gap: 10px; align-items: center; padding: 14px 32px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; max-width: 300px; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.search-input { width: 100%; padding: 8px 12px 8px 34px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg); font-size: 13px; font-family: inherit; color: var(--text); outline: none; transition: all 0.25s; }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,78,121,0.1); }
.filter-select { padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg); font-size: 13px; font-family: inherit; color: var(--text); outline: none; cursor: pointer; }
.view-toggle { display: flex; border: 1px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
.view-toggle-btn { padding: 6px 12px; border: none; background: transparent; cursor: pointer; color: var(--text3); transition: all 0.2s; display: flex; align-items: center; }
.view-toggle-btn.active { background: var(--accent); color: #fff; }
.view-toggle-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

/* ======== CARD GRID ======== */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 24px 32px; }
.person-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
.person-card:hover { box-shadow: var(--shadow); border-color: var(--accent-mid); transform: translateY(-2px); }
.person-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0; }
.person-name { font-size: 15px; font-weight: 600; }
.person-dept { font-size: 12px; color: var(--text3); margin-top: 2px; }
.person-roles { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.role-tag { padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.role-tag.product_design { background: var(--purple-bg); color: var(--purple); }
.role-tag.frontend { background: var(--accent-light); color: var(--accent); }
.role-tag.backend { background: var(--green-bg); color: var(--green); }
.role-tag.testing { background: var(--amber-bg); color: var(--amber); }
.role-tag.custom { background: var(--teal-bg); color: var(--teal); }
.person-info-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.person-info-row svg { flex-shrink: 0; color: var(--text3); }
.status-badge { position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; }
.status-badge.active { background: var(--green-bg); color: var(--green); }
.status-badge.inactive { background: var(--surface2); color: var(--text3); }
.status-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ======== TABLE VIEW ======== */
.table-wrap { padding: 24px 32px; }
.people-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.people-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--text3); border-bottom: 2px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
.people-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.people-table tr { transition: background 0.15s; cursor: pointer; }
.people-table tr:hover td { background: var(--surface2); }
.table-avatar { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; vertical-align: middle; margin-right: 10px; }
.table-name-cell { display: flex; align-items: center; gap: 10px; }

/* ======== DETAIL VIEW ======== */
.detail-view { flex: 1; overflow-y: auto; }
.detail-topbar { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
.detail-content { max-width: 900px; margin: 0 auto; padding: 32px; }
.profile-header { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.profile-avatar { width: 72px; height: 72px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #fff; flex-shrink: 0; }
.profile-name { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.profile-dept { font-size: 14px; color: var(--text2); margin-bottom: 10px; }
.profile-info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
.profile-info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
.profile-info-item svg { flex-shrink: 0; color: var(--text3); }
.profile-info-item strong { color: var(--text); font-weight: 500; }
.profile-notes { background: var(--surface2); border-radius: var(--radius); padding: 16px 20px; font-size: 13px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; border: 1px solid var(--border); }
.section-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.task-list-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); margin-bottom: 8px; font-size: 13px; transition: var(--transition); }
.task-list-item:hover { background: var(--surface2); }
.task-project-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--accent-light); color: var(--accent); font-weight: 500; flex-shrink: 0; }
.task-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.task-status-dot.todo { background: var(--text3); }
.task-status-dot.doing { background: var(--accent2); }
.task-status-dot.done { background: var(--green); }

/* ======== FORM MODAL ======== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-overlay.show .modal { animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes modalIn { from { opacity:0; transform:scale(0.92) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal { background: var(--surface); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); width: 560px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text3); padding: 4px 8px; border-radius: 6px; transition: all 0.2s; }
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-input { width: 100%; padding: 9px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg); font-size: 13px; font-family: inherit; color: var(--text); outline: none; transition: all 0.25s; }
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,78,121,0.08); }
textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.7; }
.form-row { display: flex; gap: 14px; }
.form-row > * { flex: 1; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
.role-checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
.role-cb-label { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); font-size: 13px; cursor: pointer; transition: all 0.2s; user-select: none; }
.role-cb-label:hover { border-color: var(--accent-mid); background: var(--accent-light); }
.role-cb-label input:checked ~ span { font-weight: 600; }
.role-cb-label:has(input:checked) { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.role-cb-label input { display: none; }
.status-radio-group { display: flex; gap: 8px; margin-top: 6px; }
.status-radio { display: flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border2); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.status-radio:hover { border-color: var(--accent-mid); }
.status-radio.selected { border-color: var(--green); background: var(--green-bg); color: var(--green); font-weight: 500; }
.status-radio.selected.inactive-sel { border-color: var(--text3); background: var(--surface2); color: var(--text3); }
.status-radio input { display: none; }

/* ======== CONFIRM ======== */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 400; align-items: center; justify-content: center; }
.confirm-overlay.show { display: flex; }
.confirm-overlay.show .confirm-box { animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.confirm-box { background: var(--surface); border-radius: 16px; padding: 28px; width: 360px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center; }
.confirm-box h4 { font-size: 16px; margin-bottom: 8px; font-weight: 600; }
.confirm-box p { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.7; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

/* ======== TOAST ======== */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: 10px; font-size: 13px; color: #fff; animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 8px; font-weight: 500; }
.toast.success { background: rgba(45,106,79,0.95); }
.toast.error { background: rgba(155,28,28,0.95); }
.toast.info { background: rgba(31,78,121,0.95); }
.toast-exit { animation: toastOut 0.3s ease-in forwards; }
@keyframes toastIn { from { opacity:0; transform:translateX(40px) scale(0.95); } to { opacity:1; transform:translateX(0) scale(1); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateX(40px); } }

/* ======== EMPTY STATE ======== */
.empty-state { text-align: center; padding: 60px 24px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
.empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* ======== ANIMATIONS ======== */
.view-enter { animation: viewIn 0.28s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes viewIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>人员管理</h1>
      <p>People Management</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" id="nav-list" onclick="showView('list')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        所有人员
      </div>
      <div class="nav-item" id="nav-new" onclick="openPersonModal(null)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
          <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
        </svg>
        新建人员
      </div>
    </nav>
    <div class="sidebar-switch">
      <a class="switch-item" href="home.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        导航主页
      </a>
    </div>
    <div class="sidebar-footer">
      <span onclick="toggleTheme()">&#9790; 切换主题</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">所有人员</span>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openPersonModal(null)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新建人员
        </button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Person Form Modal -->
<div class="modal-overlay" id="person-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">新建人员</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">姓名 *</label>
        <input class="form-input" id="pf-name" placeholder="请输入姓名">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">部门</label>
          <input class="form-input" id="pf-dept" placeholder="如：技术部">
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <div class="status-radio-group" id="pf-status-group">
            <label class="status-radio selected" onclick="setStatus('active')">
              <input type="radio" name="pf-status" value="active" checked>
              <span class="status-badge-dot" style="background:var(--green);"></span> 在职
            </label>
            <label class="status-radio" onclick="setStatus('inactive')">
              <input type="radio" name="pf-status" value="inactive">
              <span class="status-badge-dot" style="background:var(--text3);"></span> 离职
            </label>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">角色</label>
        <div class="role-checkbox-group" id="pf-roles"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">手机</label>
          <input class="form-input" id="pf-phone" placeholder="手机号码">
        </div>
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input class="form-input" id="pf-email" type="email" placeholder="邮箱地址">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="form-input" id="pf-notes" rows="3" placeholder="补充信息..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="savePerson()">保存</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirm-dialog">
  <div class="confirm-box">
    <h4 id="confirm-title">确认</h4>
    <p id="confirm-msg">确定要执行此操作吗？</p>
    <div class="confirm-actions">
      <button class="btn" onclick="closeConfirm(false)">取消</button>
      <button class="btn btn-danger" onclick="closeConfirm(true)">确定删除</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ======== CONSTANTS ========
const BUILTIN_ROLES = { product_design: '产品设计', frontend: '前端', backend: '后端', testing: '测试' };
let ROLE_LABELS = { ...BUILTIN_ROLES };
const AVATAR_COLORS = ['#4F46E5','#0891B2','#059669','#D97706','#DC2626','#7C3AED','#2563EB','#0D9488','#EA580C','#BE185D'];

// ======== STATE ========
let people = [];
let projects = [];
let currentView = 'list';
let viewMode = 'card'; // card | table
let editingPersonId = null;
let confirmResolve = null;
let currentDetailId = null;

// ======== UTILS ========
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function linkifyUrls(text) {
  if (!text) return '';
  const escaped = escHtml(text);
  return escaped.replace(/(https?:\/\/[^\s<>&"']+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:underline;word-break:break-all;" onclick="event.stopPropagation()">$1</a>');
}

function getAvatarColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}
function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return name.slice(0, 1).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function fmtDate(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ======== TOAST ========
function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success: '✓', error: '✗', info: 'ℹ' };
  t.innerHTML = `<span>${icons[type]||'ℹ'}</span><span>${escHtml(msg)}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('toast-exit'); t.addEventListener('animationend', () => t.remove()); }, 2800);
}

// ======== CONFIRM ========
function showConfirm(title, msg) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-dialog').classList.add('show');
  return new Promise(r => { confirmResolve = r; });
}
function closeConfirm(r) {
  document.getElementById('confirm-dialog').classList.remove('show');
  if (confirmResolve) { confirmResolve(r); confirmResolve = null; }
}

// ======== DATA ========
async function loadPeople() {
  try {
    if (window.electronAPI?.readPeople) {
      people = await window.electronAPI.readPeople();
      if (!Array.isArray(people)) people = [];
    } else {
      people = JSON.parse(localStorage.getItem('kanban_people') || '[]');
    }
  } catch { people = []; }
}
async function savePeopleToFS() {
  try {
    if (window.electronAPI?.savePeople) {
      await window.electronAPI.savePeople(people);
    } else {
      localStorage.setItem('kanban_people', JSON.stringify(people));
    }
  } catch (e) { showToast('保存失败: ' + e.message, 'error'); }
}
async function loadProjects() {
  try {
    if (window.electronAPI?.readProjects) {
      projects = await window.electronAPI.readProjects();
      if (!Array.isArray(projects)) projects = [];
    } else {
      projects = JSON.parse(localStorage.getItem('kanban_projects') || '[]');
    }
  } catch { projects = []; }
}

// ======== VIEWS ========
function showView(view) {
  currentView = view;
  document.getElementById('nav-list').classList.toggle('active', view === 'list');
  const titles = { list: '所有人员', detail: '人员详情' };
  document.getElementById('topbar-title').textContent = titles[view] || '人员管理';
  renderView();
}
function renderView() {
  const c = document.getElementById('content');
  if (currentView === 'list') renderListView(c);
  else if (currentView === 'detail') renderDetailView(c);
  const inner = c.firstElementChild;
  if (inner) inner.classList.add('view-enter');
}

// ======== LIST VIEW ========
function renderListView(c) {
  const total = people.length;
  const active = people.filter(p => p.status !== 'inactive').length;
  const roleCount = {};
  for (const r of Object.keys(ROLE_LABELS)) roleCount[r] = people.filter(p => (p.roles||[]).includes(r)).length;

  let html = `<div>`;
  // Stats bar
  html += `<div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--accent-light);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      </div>
      <div><div class="stat-num">${total}</div><div class="stat-label">总人数</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--green-bg);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div><div class="stat-num">${active}</div><div class="stat-label">在职</div></div>
    </div>`;
  for (const [r, label] of Object.entries(ROLE_LABELS)) {
    html += `<div class="stat-card">
      <div class="stat-icon" style="background:var(--${r==='product_design'?'purple':r==='frontend'?'accent':r==='backend'?'green':'amber'}-bg, var(--surface2));">
        <span style="font-size:14px; font-weight:700; color:var(--${r==='product_design'?'purple':r==='frontend'?'accent':r==='backend'?'green':'amber'});">${roleCount[r]}</span>
      </div>
      <div><div class="stat-num" style="font-size:14px;">${label}</div><div class="stat-label">${roleCount[r]} 人</div></div>
    </div>`;
  }
  html += `</div>`;

  // Filter bar
  html += `<div class="filter-bar">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search" placeholder="搜索姓名、部门..." oninput="filterPeople()">
    </div>
    <select class="filter-select" id="filter-role" onchange="filterPeople()">
      <option value="">所有角色</option>
      ${Object.entries(ROLE_LABELS).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}
    </select>
    <select class="filter-select" id="filter-status" onchange="filterPeople()">
      <option value="">所有状态</option>
      <option value="active">在职</option>
      <option value="inactive">离职</option>
    </select>
    <div style="margin-left:auto;"></div>
    <div class="view-toggle">
      <button class="view-toggle-btn ${viewMode==='card'?'active':''}" onclick="setViewMode('card')" title="卡片视图">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-toggle-btn ${viewMode==='table'?'active':''}" onclick="setViewMode('table')" title="表格视图">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
  </div>`;

  html += `<div id="people-container">${renderPeopleContent(people)}</div>`;
  html += `</div>`;
  c.innerHTML = html;
}

function renderPeopleContent(list) {
  if (!list.length) return `<div class="empty-state"><div class="empty-icon">👥</div><h3>暂无人员数据</h3><p>点击"新建人员"开始添加团队成员</p></div>`;
  return viewMode === 'card' ? renderCardGrid(list) : renderTable(list);
}

function renderCardGrid(list) {
  return `<div class="card-grid">${list.map(p => {
    const color = getAvatarColor(p.name || '');
    const initials = getInitials(p.name);
    const roles = (p.roles||[]).map(r => `<span class="role-tag ${r}">${ROLE_LABELS[r]||r}</span>`).join('');
    const isActive = p.status !== 'inactive';
    return `<div class="person-card" onclick="openDetail('${p.id}')">
      <span class="status-badge ${isActive?'active':'inactive'}"><span class="status-badge-dot"></span>${isActive?'在职':'离职'}</span>
      <div class="person-card-top">
        <div class="avatar" style="background:${color}">${initials}</div>
        <div>
          <div class="person-name">${escHtml(p.name)}</div>
          ${p.department ? `<div class="person-dept">${escHtml(p.department)}</div>` : ''}
        </div>
      </div>
      ${roles ? `<div class="person-roles">${roles}</div>` : ''}
      ${p.phone ? `<div class="person-info-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6 6l.93-.93a2 2 0 0 1 2.11-.45c.908.339 1.85.573 2.81.7A2 2 0 0 1 21.46 16"/></svg>${escHtml(p.phone)}</div>` : ''}
      ${p.email ? `<div class="person-info-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${escHtml(p.email)}</div>` : ''}
      <div class="person-info-row" style="margin-top:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>加入时间：${fmtDate(p.createdAt)}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderTable(list) {
  return `<div class="table-wrap"><table class="people-table"><thead><tr>
    <th>姓名</th><th>部门</th><th>角色</th><th>手机</th><th>邮箱</th><th>状态</th><th>操作</th>
  </tr></thead><tbody>
  ${list.map(p => {
    const color = getAvatarColor(p.name || '');
    const initials = getInitials(p.name);
    const roles = (p.roles||[]).map(r => `<span class="role-tag ${r}" style="margin-right:4px;">${ROLE_LABELS[r]||r}</span>`).join('');
    const isActive = p.status !== 'inactive';
    return `<tr onclick="openDetail('${p.id}')">
      <td><div class="table-name-cell"><span class="table-avatar" style="background:${color}">${initials}</span><strong>${escHtml(p.name)}</strong></div></td>
      <td>${escHtml(p.department||'--')}</td>
      <td>${roles||'--'}</td>
      <td>${escHtml(p.phone||'--')}</td>
      <td>${escHtml(p.email||'--')}</td>
      <td><span class="status-badge ${isActive?'active':'inactive'}"><span class="status-badge-dot"></span>${isActive?'在职':'离职'}</span></td>
      <td onclick="event.stopPropagation()">
        <button class="btn btn-sm btn-ghost" onclick="openPersonModal('${p.id}')">编辑</button>
        <button class="btn btn-sm btn-ghost btn-danger" onclick="confirmDelete('${p.id}')">删除</button>
      </td>
    </tr>`;
  }).join('')}
  </tbody></table></div>`;
}

function setViewMode(mode) {
  viewMode = mode;
  renderView();
}

function filterPeople() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const role = document.getElementById('filter-role')?.value || '';
  const status = document.getElementById('filter-status')?.value || '';
  let list = people;
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || (p.department||'').toLowerCase().includes(q) || (p.email||'').toLowerCase().includes(q));
  if (role) list = list.filter(p => (p.roles||[]).includes(role));
  if (status) list = list.filter(p => status === 'active' ? p.status !== 'inactive' : p.status === 'inactive');
  const container = document.getElementById('people-container');
  if (container) container.innerHTML = renderPeopleContent(list);
}

// ======== DETAIL VIEW ========
function openDetail(id) {
  currentDetailId = id;
  currentView = 'detail';
  document.getElementById('topbar-title').textContent = '人员详情';
  document.getElementById('nav-list').classList.remove('active');
  renderView();
}

function renderDetailView(c) {
  const p = people.find(x => x.id === currentDetailId);
  if (!p) { showView('list'); return; }

  const color = getAvatarColor(p.name || '');
  const initials = getInitials(p.name);
  const isActive = p.status !== 'inactive';
  const roles = (p.roles||[]).map(r => `<span class="role-tag ${r}">${ROLE_LABELS[r]||r}</span>`).join('');

  // Find tasks assigned to this person
  const assignedTasks = [];
  for (const proj of projects) {
    for (const sp of (proj.subProjects || [])) {
      for (const task of (sp.tasks || [])) {
        if ((task.assignees || []).includes(p.id)) {
          assignedTasks.push({ ...task, projectName: proj.name, subProjectName: sp.name });
        }
      }
    }
  }

  // Find projects where person is owner
  const ownedProjects = projects.filter(proj =>
    (proj.owners || []).includes(p.id) || (proj.owner || '').includes(p.name)
  );

  // Find role assignments in subprojects
  const roleAssignments = [];
  for (const proj of projects) {
    for (const sp of (proj.subProjects || [])) {
      if (!sp.owners) continue;
      for (const [role, ids] of Object.entries(sp.owners)) {
        if (ids.includes(p.id)) {
          const pct = sp.roleProgress ? (sp.roleProgress[role] || 0) : 0;
          roleAssignments.push({ projectName: proj.name, subProjectName: sp.name, role, progress: pct });
        }
      }
    }
  }

  let html = `<div class="detail-view">
    <div class="detail-topbar">
      <button class="btn btn-sm" onclick="showView('list')">← 返回列表</button>
      <button class="btn btn-sm" onclick="openPersonModal('${p.id}')">✏ 编辑</button>
      <button class="btn btn-sm btn-danger" onclick="confirmDelete('${p.id}')">删除</button>
    </div>
    <div class="detail-content">
      <div class="profile-header">
        <div class="profile-avatar" style="background:${color}">${initials}</div>
        <div style="flex:1;">
          <div class="profile-name">${escHtml(p.name)}
            <span class="status-badge ${isActive?'active':'inactive'}" style="vertical-align:middle; margin-left:8px;"><span class="status-badge-dot"></span>${isActive?'在职':'离职'}</span>
          </div>
          ${p.department ? `<div class="profile-dept">${escHtml(p.department)}</div>` : ''}
          ${roles ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">${roles}</div>` : ''}
        </div>
      </div>

      <div class="profile-info-grid">
        <div class="profile-info-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2c-2.84-.13-5.59-1.08-7.92-2.73A17.55 17.55 0 0 1 5.64 11C4.18 8.6 3.22 5.79 3.1 2.9A2 2 0 0 1 5.08 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 8.87a16 16 0 0 0 6.07 6.07l1.23-1.24a2 2 0 0 1 2.11-.45c.908.339 1.85.573 2.81.7A2 2 0 0 1 22.92 16"/></svg>
          <strong>${escHtml(p.phone || '未填写')}</strong>
        </div>
        <div class="profile-info-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <strong>${escHtml(p.email || '未填写')}</strong>
        </div>
        <div class="profile-info-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          加入时间：<strong>${fmtDate(p.createdAt)}</strong>
        </div>
      </div>

      ${p.notes ? `<div style="margin-bottom:28px;"><div class="section-title">备注</div><div class="profile-notes">${linkifyUrls(p.notes)}</div></div>` : ''}

      <div style="margin-bottom:28px;">
        <div class="section-title">负责的项目 (${ownedProjects.length})</div>
        ${ownedProjects.length ? ownedProjects.map(proj =>
          `<div class="task-list-item"><span class="task-project-badge">${escHtml(proj.name)}</span><span style="color:var(--text2);font-size:12px;">进度 ${proj.progress||0}%</span></div>`
        ).join('') : `<div style="color:var(--text3);font-size:13px;padding:8px 0;">暂无负责的项目</div>`}
      </div>

      <div style="margin-bottom:28px;">
        <div class="section-title">角色分工 (${roleAssignments.length})</div>
        ${roleAssignments.length ? roleAssignments.map(ra =>
          `<div class="task-list-item">
            <span class="role-tag ${ra.role}">${ROLE_LABELS[ra.role]||ra.role}</span>
            <span>${escHtml(ra.projectName)} / ${escHtml(ra.subProjectName)}</span>
            <span style="margin-left:auto;font-size:12px;color:var(--text3);">进度 ${ra.progress}%</span>
          </div>`
        ).join('') : `<div style="color:var(--text3);font-size:13px;padding:8px 0;">暂无角色分工</div>`}
      </div>

      <div style="margin-bottom:28px;">
        <div class="section-title">分配的任务 (${assignedTasks.length})</div>
        ${assignedTasks.length ? assignedTasks.map(t => {
          const statusMap = { todo: '待办', doing: '进行中', done: '已完成' };
          return `<div class="task-list-item">
            <span class="task-status-dot ${t.status||'todo'}"></span>
            <span>${escHtml(t.name || t.title || '未命名')}</span>
            <span class="task-project-badge" style="margin-left:auto;">${escHtml(t.projectName)}</span>
            <span style="font-size:11px;color:var(--text3);">${statusMap[t.status]||'待办'}</span>
          </div>`;
        }).join('') : `<div style="color:var(--text3);font-size:13px;padding:8px 0;">暂无分配的任务</div>`}
      </div>
    </div>
  </div>`;
  c.innerHTML = html;
}

// ======== MODAL ========
function renderRoleCheckboxes(selectedRoles = []) {
  const container = document.getElementById('pf-roles');
  container.innerHTML = Object.entries(ROLE_LABELS).map(([key, label]) =>
    `<label class="role-cb-label"><input type="checkbox" value="${key}" ${selectedRoles.includes(key)?'checked':''}><span>${escHtml(label)}</span></label>`
  ).join('');
}

function openPersonModal(personId) {
  editingPersonId = personId;
  const p = personId ? people.find(x => x.id === personId) : null;

  document.getElementById('modal-title').textContent = p ? '编辑人员' : '新建人员';
  document.getElementById('pf-name').value = p?.name || '';
  document.getElementById('pf-dept').value = p?.department || '';
  document.getElementById('pf-phone').value = p?.phone || '';
  document.getElementById('pf-email').value = p?.email || '';
  document.getElementById('pf-notes').value = p?.notes || '';

  // Roles - dynamically render
  renderRoleCheckboxes(p ? (p.roles || []) : []);

  // Status
  setStatus(p?.status || 'active');

  document.getElementById('person-modal').classList.add('show');
  setTimeout(() => document.getElementById('pf-name').focus(), 100);
}

function closeModal() {
  document.getElementById('person-modal').classList.remove('show');
}

function setStatus(val) {
  document.querySelectorAll('#pf-status-group .status-radio').forEach(el => {
    const input = el.querySelector('input');
    el.classList.toggle('selected', input.value === val);
    el.classList.toggle('inactive-sel', input.value === 'inactive' && input.value === val);
    input.checked = input.value === val;
  });
}

async function savePerson() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { showToast('请输入姓名', 'error'); return; }

  const roles = Array.from(document.querySelectorAll('#pf-roles input:checked')).map(cb => cb.value);
  const status = document.querySelector('input[name="pf-status"]:checked')?.value || 'active';

  const data = {
    name,
    department: document.getElementById('pf-dept').value.trim(),
    roles,
    status,
    phone: document.getElementById('pf-phone').value.trim(),
    email: document.getElementById('pf-email').value.trim(),
    notes: document.getElementById('pf-notes').value.trim(),
  };

  if (editingPersonId) {
    const idx = people.findIndex(p => p.id === editingPersonId);
    if (idx >= 0) people[idx] = { ...people[idx], ...data };
  } else {
    people.push({ id: genId(), ...data, createdAt: new Date().toISOString() });
  }

  await savePeopleToFS();
  closeModal();
  showToast(editingPersonId ? '人员已更新' : '人员已添加', 'success');

  if (currentView === 'detail' && editingPersonId) renderView();
  else showView('list');
}

async function confirmDelete(id) {
  const p = people.find(x => x.id === id);
  const yes = await showConfirm('确认删除', `确定删除人员「${p?.name || ''}」吗？此操作不可恢复。`);
  if (!yes) return;
  people = people.filter(x => x.id !== id);
  await savePeopleToFS();
  showToast('人员已删除', 'success');
  showView('list');
}

// ======== THEME ========
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur === 'dark' ? '' : 'dark');
  localStorage.setItem('theme', cur === 'dark' ? '' : 'dark');
}

// ======== KEYBOARD ========
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key === 'Escape') {
    if (document.getElementById('person-modal').classList.contains('show')) closeModal();
    else if (currentView === 'detail') showView('list');
  }
});

// ======== LOAD CUSTOM ROLES ========
async function loadCustomRoles() {
  if (window.electronAPI?.getSettings) {
    const settings = await window.electronAPI.getSettings();
    const customRoles = settings.customRoles || [];
    ROLE_LABELS = { ...BUILTIN_ROLES };
    for (const r of customRoles) {
      ROLE_LABELS[r.key] = r.name;
    }
  }
}

// ======== INIT ========
async function init() {
  const t = localStorage.getItem('theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
  await loadCustomRoles();
  await loadPeople();
  await loadProjects();
  showView('list');
}
init();
</script>
