<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每周工作复盘系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0eeea;
  --border: rgba(30,30,30,0.1);
  --border2: rgba(30,30,30,0.18);
  --text: #1a1a1a;
  --text2: #5a5a5a;
  --text3: #999;
  --accent: #1F4E79;
  --accent2: #2E75B6;
  --accent-light: #e8f0f8;
  --accent-mid: #b8d0ea;
  --green: #2d6a4f;
  --green-bg: #e8f5ee;
  --amber: #92400e;
  --amber-bg: #fef3c7;
  --red: #9b1c1c;
  --red-bg: #fee2e2;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow2: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #283548;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #2563eb;
  --accent2: #60a5fa;
  --accent-light: #1e3252;
  --accent-mid: rgba(96,165,250,0.2);
  --green: #4ade80;
  --green-bg: #052e16;
  --amber: #fbbf24;
  --amber-bg: #1c1400;
  --red: #f87171;
  --red-bg: #2d0000;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow2: 0 8px 32px rgba(0,0,0,0.5);
}
[data-theme="dark"] .sidebar { background: #1e3252; }
[data-theme="dark"] .dim-input textarea:focus { background: var(--surface2) !important; }
[data-theme="dark"] .folder-banner { background: #1c1400; border-color: #92400e; color: #fbbf24; }
[data-theme="dark"] .folder-banner button { background: #1e293b; color: #fbbf24; border-color: #92400e; }
[data-theme="dark"] .folder-banner button:hover { background: #283548; }
[data-theme="dark"] .section-header:hover { background: #1e3252 !important; }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ======== LAYOUT ======== */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--accent);
  color: #fff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  transition: var(--transition);
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.sidebar-logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.3px;
  line-height: 1.3;
  color: #fff;
}
.sidebar-logo p {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.sidebar-nav { flex: 1; padding: 16px 0; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  cursor: pointer;
  color: rgba(255,255,255,0.65);
  font-size: 13.5px;
  transition: var(--transition);
  border-left: 3px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-item.active {
  color: #fff;
  background: rgba(255,255,255,0.12);
  border-left-color: rgba(255,255,255,0.7);
}
.nav-icon { width: 18px; height: 18px; opacity: 0.9; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.12);
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}

.main {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ======== FOLDER BANNER ======== */
.folder-banner {
  background: #fef3c7;
  border-bottom: 1px solid #f59e0b;
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: #92400e;
}
.folder-banner button {
  padding: 4px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid #f59e0b;
  background: #fff;
  color: #92400e;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
}
.folder-banner button:hover { background: #fef3c7; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title { font-size: 17px; font-weight: 500; }
.topbar-actions { display: flex; gap: 10px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text);
  transition: var(--transition);
  font-weight: 500;
}
.btn:hover { background: var(--surface2); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: #163d61; border-color: #163d61; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.theme-toggle {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.theme-toggle:hover { background: var(--surface2); color: var(--text); }

.content { padding: 28px 32px; flex: 1; }

/* ======== VIEWS ======== */
.view { display: none; animation: fadeIn 0.25s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ======== LIST VIEW ======== */
.list-controls {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  transition: var(--transition);
}
.search-box input:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(46,117,182,0.12); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.filter-select {
  padding: 9px 14px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
}
.filter-select:focus { outline: none; border-color: var(--accent2); }

.view-toggle { display: flex; gap: 2px; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; }
.toggle-btn {
  padding: 5px 10px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text2);
  transition: var(--transition);
  font-size: 13px;
}
.toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

/* Card grid */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
}

.review-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.review-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent2);
  opacity: 0;
  transition: var(--transition);
}
.review-card:hover { box-shadow: var(--shadow2); border-color: var(--accent-mid); transform: translateY(-2px); }
.review-card:hover::before { opacity: 1; }

.card-week { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.card-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
.card-date { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.tag {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.tag-blue { background: var(--accent-light); color: var(--accent); }
.tag-green { background: var(--green-bg); color: var(--green); }
.tag-amber { background: var(--amber-bg); color: var(--amber); }

.card-preview { font-size: 12.5px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }

/* Timeline */
.timeline { position: relative; }
.timeline::before {
  content: '';
  position: absolute;
  left: 20px;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--accent2), var(--accent-mid), transparent);
}
.timeline-item { display: flex; gap: 24px; margin-bottom: 20px; position: relative; }
.timeline-dot {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--surface);
  box-shadow: 0 0 0 2px var(--accent-mid);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  z-index: 1;
  margin-top: 4px;
}
.timeline-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  transition: var(--transition);
}
.timeline-card:hover { box-shadow: var(--shadow2); border-color: var(--accent-mid); }
.tl-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.tl-title { font-size: 14.5px; font-weight: 500; }
.tl-meta { font-size: 11.5px; color: var(--text3); text-align: right; }
.tl-body { font-size: 12.5px; color: var(--text2); line-height: 1.5; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 15px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
.empty-state p { font-size: 13px; margin-bottom: 24px; }

/* ======== DETAIL VIEW ======== */
.detail-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 20px;
}
.detail-back { display: flex; align-items: center; gap: 6px; color: var(--accent2); cursor: pointer; font-size: 13px; margin-bottom: 16px; transition: var(--transition); }
.detail-back:hover { color: var(--accent); }
.detail-week-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
.detail-title { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
.detail-date { font-size: 13px; color: var(--text2); }
.detail-meta { display: flex; gap: 24px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.detail-meta-item { font-size: 12px; color: var(--text2); }
.detail-meta-item strong { display: block; font-size: 13px; color: var(--text); font-weight: 500; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  background: var(--accent-light);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: var(--transition);
}
.section-header:hover { background: #dce9f5; }
.section-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.section-title { font-size: 14px; font-weight: 500; color: var(--accent); flex: 1; }
.section-toggle { color: var(--text3); transition: var(--transition); }
.section-toggle.open { transform: rotate(180deg); }
.section-body { padding: 0; transition: var(--transition); }
.section-body.collapsed { display: none; }

.detail-table { width: 100%; border-collapse: collapse; }
.detail-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
.detail-table td { padding: 12px 20px; vertical-align: top; }
.detail-table td:first-child {
  width: 150px;
  font-size: 12.5px;
  color: var(--text2);
  font-weight: 500;
  background: var(--surface2);
  white-space: nowrap;
}
.detail-table td:last-child { font-size: 13px; white-space: pre-wrap; line-height: 1.7; }

.action-table { width: 100%; border-collapse: collapse; }
.action-table th { padding: 10px 16px; background: var(--surface2); font-size: 12px; font-weight: 500; text-align: left; border-bottom: 1px solid var(--border); color: var(--text2); }
.action-table td { padding: 10px 16px; font-size: 12.5px; border-bottom: 1px solid var(--border); }
.action-table tr:last-child td { border-bottom: none; }
.priority-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.priority-high { background: var(--red-bg); color: var(--red); }
.priority-mid { background: var(--amber-bg); color: var(--amber); }
.priority-low { background: var(--green-bg); color: var(--green); }

/* ======== FORM VIEW ======== */
.form-container { max-width: 900px; }
.form-progress {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  overflow-x: auto;
}
.progress-step {
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  transition: var(--transition);
  cursor: pointer;
  border: 2px solid var(--border2);
  background: var(--surface);
  color: var(--text3);
}
.step-dot.done { background: var(--green); border-color: var(--green); color: #fff; }
.step-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.step-label { font-size: 11.5px; color: var(--text3); margin-left: 6px; margin-right: 4px; white-space: nowrap; }
.step-label.active { color: var(--accent); font-weight: 500; }
.step-label.done { color: var(--green); }
.step-line { width: 24px; height: 2px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.step-line.done { background: var(--green); }

.form-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  overflow: hidden;
  display: none;
}
.form-section.active { display: block; animation: fadeIn 0.2s ease; }
.form-section-header {
  padding: 16px 24px;
  background: var(--accent);
  display: flex; align-items: center; gap: 10px;
}
.form-section-header h3 { color: #fff; font-size: 15px; font-weight: 500; }
.form-section-header p { color: rgba(255,255,255,0.65); font-size: 12px; margin-top: 2px; }
.form-body { padding: 24px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { margin-bottom: 16px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { display: block; font-size: 12.5px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.form-label .req { color: #e53e3e; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 9px 13px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface);
  transition: var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(46,117,182,0.1);
}
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.form-hint { font-size: 11.5px; color: var(--text3); margin-top: 4px; }

.dim-block {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  overflow: hidden;
}
.dim-block-header {
  padding: 10px 16px;
  background: var(--accent-light);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.dim-block-body { padding: 16px; }
.dim-row { display: grid; grid-template-columns: 130px 1fr; gap: 0; margin-bottom: 0; }
.dim-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.dim-label {
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  background: var(--surface2);
  display: flex;
  align-items: flex-start;
  padding-top: 12px;
}
.dim-input { padding: 8px; }
.dim-input textarea {
  width: 100%;
  border: none;
  resize: none;
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  background: transparent;
  outline: none;
  min-height: 64px;
  line-height: 1.6;
}
.dim-input textarea:focus { background: #fafbfc; }

.action-row-form {
  display: grid;
  grid-template-columns: 40px 1fr 80px 100px 1fr 80px;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 8px;
}
.action-cell {
  padding: 8px 10px;
  border-right: 1px solid var(--border);
}
.action-cell:last-child { border-right: none; }
.action-cell input, .action-cell select {
  width: 100%;
  border: none;
  font-size: 12.5px;
  font-family: inherit;
  background: transparent;
  color: var(--text);
  outline: none;
}
.action-cell-header {
  background: var(--surface2);
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  padding: 6px 10px;
}

.form-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.form-step-indicator { font-size: 12.5px; color: var(--text3); }

/* ======== STATS VIEW ======== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.stat-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.3px; }
.stat-value { font-size: 28px; font-weight: 300; color: var(--accent); font-family: 'DM Serif Display', serif; }
.stat-sub { font-size: 11.5px; color: var(--text3); margin-top: 4px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.chart-title { font-size: 13.5px; font-weight: 500; margin-bottom: 16px; }
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; color: var(--text2); width: 80px; flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; height: 20px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent2); border-radius: 4px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.bar-val { font-size: 11px; color: #fff; font-weight: 500; }

/* ======== MODAL / TOAST ======== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}
.modal-overlay.open { display: flex; }

.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 10px; }

.toast {

<script>
const IDB_NAME = 'weekly_review_idb';
const IDB_STORE = 'handles';
let currentView = 'list';
let displayMode = 'card';
let currentStep = 0;
let editingId = null;
let deleteTargetId = null;
let formData = {};

// In-memory DB (replaces getDB/saveDB for runtime)
let db = [];
let people = [];

// File System Access API state
let dataFolderHandle = null;
const FSA_AVAILABLE = ('showDirectoryPicker' in window);
const ELECTRON_AVAILABLE = (typeof window.electronAPI !== 'undefined');

const STEPS = [
  { id: 's0', title: '基础信息', short: '基础' },
  { id: 's1', title: '代码工程能力', short: '工程' },
  { id: 's2', title: '沟通能力', short: '沟通' },
  { id: 's3', title: '工作管理', short: '管理' },
  { id: 's4', title: '效率改进', short: '效率' },
  { id: 's5', title: '行动汇总 & 总结', short: '总结' },
];

// ======== INDEXEDDB HELPERS ========
function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function idbGet(key) {
  try {
    const idb = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = idb.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error);
    });
  } catch { return undefined; }
}

async function idbSet(key, value) {
  try {
    const idb = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = idb.transaction(IDB_STORE, 'readwrite');
      const req = tx.objectStore(IDB_STORE).put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
  } catch { /* ignore */ }
}

// ======== FILE SYSTEM ACCESS ========
function sanitizeFilename(str) {
  return str.replace(/[\\/:*?"<>|]/g, '_').trim();
}

async function tryRestoreFolder() {
  if (!FSA_AVAILABLE) return;
  try {
    const stored = await idbGet('rootFolderHandle');
    if (!stored) return;
    // Check permission
    const perm = await stored.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      dataFolderHandle = await getOrCreateDataSubfolder(stored);
      updateFolderUI(true);
      return;
    }
    const req = await stored.requestPermission({ mode: 'readwrite' });
    if (req === 'granted') {
      dataFolderHandle = await getOrCreateDataSubfolder(stored);
      updateFolderUI(true);
    }
  } catch { /* permission denied or handle stale */ }
}

async function getOrCreateDataSubfolder(rootHandle) {
  return await rootHandle.getDirectoryHandle('data', { create: true });
}

async function selectDataFolder() {
  if (!FSA_AVAILABLE) {
    showToast('您的浏览器不支持文件系统访问 API，请使用 Chrome 或 Edge', 'error');
    return;
  }
  try {
    const rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('rootFolderHandle', rootHandle);
    dataFolderHandle = await getOrCreateDataSubfolder(rootHandle);
    updateFolderUI(true);
    await loadFromFS();
    await loadPeopleFromFS();
    await seedIfEmpty();
    showToast('数据文件夹已连接', 'success');
    renderList();
  } catch (e) {
    if (e.name !== 'AbortError') showToast('选择文件夹失败：' + e.message, 'error');
  }
}

async function loadFromFS() {
  if (ELECTRON_AVAILABLE) {
    try { db = await window.electronAPI.readReviews(); if (!Array.isArray(db)) db = []; } catch { db = []; }
    db.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    return;
  }
  if (!dataFolderHandle) { db = []; return; }
  db = [];
  try {
    for await (const [name, handle] of dataFolderHandle.entries()) {
      if (name.endsWith('.json') && name !== 'people.json' && handle.kind === 'file') {
        try {
          const file = await handle.getFile();
          const text = await file.text();
          const rec = JSON.parse(text);
          db.push(rec);
        } catch { /* skip corrupted file */ }
      }
    }
  } catch { /* folder read error */ }
  db.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
}

function getFilename(rec) {
  return `review_${rec.id}.json`;
}

async function saveToFS(rec) {
  if (ELECTRON_AVAILABLE) {
    try { await window.electronAPI.saveReview(rec); } catch (e) { showToast('保存失败：' + e.message, 'error'); throw e; }
    return;
  }
  if (!dataFolderHandle) {
    showToast('请先选择数据文件夹', 'error');
    throw new Error('未选择数据文件夹');
  }
  const filename = getFilename(rec);
  try {
    const fh = await dataFolderHandle.getFileHandle(filename, { create: true });
    const writable = await fh.createWritable();
    await writable.write(JSON.stringify(rec, null, 2));
    await writable.close();
  } catch (e) {
    showToast('保存文件失败：' + e.message, 'error');
    throw e;
  }
}

async function deleteFromFS(rec) {
  if (ELECTRON_AVAILABLE) {
    try { await window.electronAPI.deleteReview(rec.id); } catch {}
    return;
  }
  if (!dataFolderHandle) return;
  const filename = getFilename(rec);
  try {
    await dataFolderHandle.removeEntry(filename);
  } catch { /* file might not exist */ }
}

function updateFolderUI(connected) {
  const banner = document.getElementById('folder-banner');
  const statusText = document.getElementById('folder-status-text');
  const connectBtn = document.getElementById('connect-folder-btn-wrap');
  if (ELECTRON_AVAILABLE) {
    banner.style.display = 'none';
    statusText.textContent = '✓ 桌面端本地存储';
    statusText.style.color = 'rgba(255,255,255,0.85)';
    if (connectBtn) connectBtn.style.display = 'none';
    return;
  }
  if (connected) {
    banner.style.display = 'none';
    statusText.textContent = '✓ JSON 文件已连接';
    statusText.style.color = 'rgba(255,255,255,0.85)';
    if (connectBtn) connectBtn.style.display = 'none';
  } else {
    banner.style.display = 'none';
    statusText.textContent = '未连接数据文件夹';
    statusText.style.color = 'rgba(255,255,255,0.5)';
    if (connectBtn) connectBtn.style.display = 'block';
  }
}

// ======== UTILS ========
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ======== PEOPLE LOADING ========
async function loadPeopleFromFS() {
  if (ELECTRON_AVAILABLE) {
    try { people = await window.electronAPI.readPeople(); if (!Array.isArray(people)) people = []; } catch { people = []; }
    return;
  }
  if (!dataFolderHandle) { people = []; return; }
  try {
    const fh = await dataFolderHandle.getFileHandle('people.json', { create: false });
    const file = await fh.getFile();
    const text = await file.text();
    people = JSON.parse(text);
    if (!Array.isArray(people)) people = [];
  } catch { people = []; }
}

  const isOpen = wrap.classList.contains('open');

function initMs(wrapperId, options, selectedVals, placeholder) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;

  dropdown.innerHTML = options.map(opt => `

function updateMsTags(wrapperId, placeholder) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const tagsEl = document.getElementById(wrapperId + '-tags');
  if (!tagsEl) return;
  const checked = Array.from(wrap.querySelectorAll('input[type=checkbox]:checked'));
  if (!checked.length) {

  } else {

function getMsValues(wrapperId) {

  if (idx >= 0) db[idx] = rec; else db.push(rec);
  await saveToFS(rec);
}

async function deleteRecord(rec) {

  await deleteFromFS(rec);
}

// ======== WEEK HELPERS ========
function getWeekOfMonth(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return 1;
  const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
  const firstDow = firstDay.getDay();
  const daysBack = firstDow === 0 ? 6 : firstDow - 1;
  const firstMonday = new Date(firstDay);
  firstMonday.setDate(firstDay.getDate() - daysBack);
  const dDow = d.getDay();
  const dDaysBack = dDow === 0 ? 6 : dDow - 1;
  const dMonday = new Date(d);
  dMonday.setDate(d.getDate() - dDaysBack);
  return Math.round((dMonday - firstMonday) / (7 * 86400000)) + 1;
}

function weekNumToChinese(n) {
  const chars = ['一', '二', '三', '四', '五', '六'];
  return chars[n - 1] || String(n);
}

function getWeekSunday(startStr) {
  const d = new Date(startStr + 'T00:00:00');
  if (isNaN(d)) return '';
  const dow = d.getDay();
  d.setDate(d.getDate() + (dow === 0 ? 0 : 7 - dow));
  return d.toISOString().split('T')[0];
}

function generateTitle(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return '';
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const weekNum = getWeekOfMonth(dateStr);
  const chinese = weekNumToChinese(weekNum);
  return `${year}年${month}月第${chinese}周复盘`;
}

function autoFillWeekFields(dateStr) {
  if (!dateStr) return;
  // Auto-fill end date (Sunday of the same week)
  const sunday = getWeekSunday(dateStr);
  const endEl = document.getElementById('f-endDate');
  if (endEl) endEl.value = sunday;

  // Auto-calculate week label
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return;
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const weekNum = getWeekOfMonth(dateStr);
  const chinese = weekNumToChinese(weekNum);
  const weekLabel = `${year}年${month}月第${chinese}周`;

  const weekNumEl = document.getElementById('f-weekNum');
  if (weekNumEl) weekNumEl.value = weekLabel;

  // Auto-fill title if empty
  const titleEl = document.getElementById('f-title');
  if (titleEl && !titleEl.value.trim()) {
    titleEl.value = weekLabel + '复盘';
  }
}

// ======== VIEW ROUTING ========
function showView(name, id = null) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navMap = { list: 0, detail: 0, new: 1, stats: 2, settings: 3 };
  document.querySelectorAll('.nav-item')[navMap[name] || 0]?.classList.add('active');
  const titles = { list: '复盘列表', detail: '复盘详情', new: editingId ? '编辑复盘' : '新建复盘', stats: '数据统计', settings: '设置' };
  document.getElementById('topbar-title').textContent = titles[name];
  if (name === 'list') { document.getElementById('view-list').classList.add('active'); renderList(); }
  else if (name === 'detail' && id) { document.getElementById('view-detail').classList.add('active'); renderDetail(id); }
  else if (name === 'new') {
    document.getElementById('view-new').classList.add('active');
    if (id) { editingId = id; loadFormData(id); } else { editingId = null; formData = {}; }
    currentStep = 0; buildForm(); renderProgress();
  }
  else if (name === 'stats') { document.getElementById('view-stats').classList.add('active'); renderStats(); }
  else if (name === 'settings') { document.getElementById('view-settings').classList.add('active'); renderSettingsView(); }
}

// ======== RENDER LIST ========
function renderList() {
  populateYearFilter();
  filterList();
}

function populateYearFilter() {
  const years = [...new Set(db.map(r => r.year || new Date(r.createdAt).getFullYear()))].sort((a,b)=>b-a);
  const sel = document.getElementById('filter-year');
  const cur = sel.value;
  sel.innerHTML = '<option value="">所有年份</option>' + years.map(y => `<option value="${y}" ${cur==y?'selected':''}>${y}年</option>`).join('');
}

function filterList() {
  let filtered = [...db];
  const q = document.getElementById('search-input').value.toLowerCase();
  const yr = document.getElementById('filter-year').value;
  const mo = document.getElementById('filter-month').value;
  if (q) filtered = filtered.filter(r => JSON.stringify(r).toLowerCase().includes(q));
  if (yr) filtered = filtered.filter(r => String(r.year || new Date(r.createdAt).getFullYear()) === yr);
  if (mo) filtered = filtered.filter(r => String(r.startMonth) === mo || String(new Date(r.createdAt).getMonth()+1) === mo);
  filtered = filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  const container = document.getElementById('list-container');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>暂无复盘记录</h3><p>点击右上角「新建复盘」开始你的第一份周复盘</p><button class="btn btn-primary" onclick="showView('new')">新建复盘</button></div>`;
    return;
  }
  if (displayMode === 'card') renderCards(filtered, container);
  else renderTimeline(filtered, container);
}

function renderCards(data, container) {
  container.innerHTML = `<div class="card-grid">${data.map(r => cardHTML(r)).join('')}</div>`;
}

function cardHTML(r) {
  const preview = r.dim1_highlight || r.weekSummary || '（无内容摘要）';
  // weekNum display: if contains Chinese chars, show as-is; otherwise wrap with 第 X 周
  const wn = r.weekNum || '';
  const weekDisplay = wn ? (/[\u4e00-\u9fa5]/.test(wn) ? wn : `第 ${wn} 周`) : '—';
  return `<div class="review-card" onclick="showView('detail','${r.id}')">
    <div class="card-week">${weekDisplay}</div>
    <div class="card-title">${r.title || `${r.startYear || ''}年${r.startMonth || ''}月复盘`}</div>
    <div class="card-date">${formatDate(r.startDate)} — ${formatDate(r.endDate)}</div>
    <div class="card-tags">
      ${r.reviewer ? `<span class="tag tag-blue">${r.reviewer}</span>` : ''}
      ${r.dim1_highlight ? '<span class="tag tag-green">技术亮点</span>' : ''}
      ${r.actionItems && r.actionItems.length ? `<span class="tag tag-amber">${r.actionItems.length} 项行动</span>` : ''}
    </div>
    <div class="card-preview">${preview}</div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="btn btn-sm" onclick="showView('new','${r.id}')">编辑</button>
      <button class="btn btn-sm" style="color:#9b1c1c;border-color:#f5a0a0" onclick="openDeleteModal('${r.id}')">删除</button>
    </div>
  </div>`;
}

function renderTimeline(data, container) {
  const items = data.map(r => {
    const mo = r.startMonth || (r.startDate ? new Date(r.startDate).getMonth()+1 : '?');
    const wn = r.weekNum || '';
    const weekDisplay = wn ? (/[\u4e00-\u9fa5]/.test(wn) ? wn : `第 ${wn} 周`) : '—';
    return `<div class="timeline-item">
      <div class="timeline-dot">${mo}月</div>
      <div class="timeline-card" onclick="showView('detail','${r.id}')">
        <div class="tl-header">
          <div>
            <div class="card-week" style="margin-bottom:3px">${weekDisplay}</div>
            <div class="tl-title">${r.title || `${r.startYear||''}年${mo}月复盘`}</div>
          </div>
          <div class="tl-meta">${formatDate(r.startDate)}<br>${r.reviewer||''}</div>
        </div>
        <div class="tl-body">${r.dim1_highlight || r.weekSummary || '（无摘要）'}</div>
        <div class="card-actions" style="margin-top:10px" onclick="event.stopPropagation()">
          <button class="btn btn-sm" onclick="showView('new','${r.id}')">编辑</button>
          <button class="btn btn-sm" style="color:#9b1c1c;border-color:#f5a0a0" onclick="openDeleteModal('${r.id}')">删除</button>
        </div>
      </div>
    </div>`;
  }).join('');
  container.innerHTML = `<div class="timeline">${items}</div>`;
}

function setDisplayMode(mode) {
  displayMode = mode;
  document.getElementById('card-toggle').classList.toggle('active', mode === 'card');
  document.getElementById('timeline-toggle').classList.toggle('active', mode === 'timeline');
  filterList();
}

function sectionCard(num, title, body, idx) {
  return `<div class="section-card">
    <div class="section-header" onclick="toggleSection(${idx})">
      <div class="section-num">${num}</div>
      <div class="section-title">${title}</div>
      <svg class="section-toggle open" id="toggle-${idx}" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>
    <div class="section-body" id="body-${idx}">${body}</div>
  </div>`;
}
function toggleSection(idx) {
  const body = document.getElementById(`body-${idx}`);
  const icon = document.getElementById(`toggle-${idx}`);
  body.classList.toggle('collapsed');
  icon.classList.toggle('open');
}
function infoTable(r) {
  const wn = r.weekNum || '—';
  const weekDisplay = /[\u4e00-\u9fa5]/.test(wn) ? wn : `第${wn}周`;
  return `<table class="detail-table">
    <tr><td>复盘周期</td><td>${formatDate(r.startDate)} — ${formatDate(r.endDate)}（${weekDisplay}）</td></tr>
    <tr><td>复盘人</td><td>${r.reviewer||'—'}</td></tr>
    <tr><td>参与人员</td><td>${r.participants||'—'}</td></tr>
    <tr><td>完成时间</td><td>${r.reviewDate||'—'}</td></tr>
  </table>`;
}
function dimTable(rows) {
  return `<table class="detail-table">${rows.map(([l,v])=>`<tr><td>${l}</td><td>${v||'（未填写）'}</td></tr>`).join('')}</table>`;
}
function actionTableHTML(items) {
  if (!items.length) return `<div style="padding:20px;color:var(--text3);font-size:13px">（未填写行动计划）</div>`;
  const ph = {高:'priority-high',中:'priority-mid',低:'priority-low'};
  return `<table class="action-table">
    <thead><tr><th>#</th><th>改进内容</th><th>优先级</th><th>完成时限</th><th>验收标准</th><th>备注</th></tr></thead>
    <tbody>${items.map((it,i)=>`<tr>
      <td>${i+1}</td><td>${it.content||'—'}</td>
      <td><span class="priority-badge ${ph[it.priority]||'priority-low'}">${it.priority||'低'}</span></td>
      <td>${it.deadline||'—'}</td><td>${it.criteria||'—'}</td><td>${it.note||'—'}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}
function summaryHTML(r) {
  const goals = getNextGoals(r).filter(g => g && g.trim());
  const goalRows = goals.length
    ? goals.map((g, i) => `<tr><td>下周目标${i+1}</td><td>${g}</td></tr>`).join('')
    : `<tr><td>下周目标</td><td>（未填写）</td></tr>`;
  return `<table class="detail-table">
    <tr><td>经验沉淀</td><td>${r.summary_exp||'（未填写）'}</td></tr>
    <tr><td>需规避问题</td><td>${r.summary_avoid||'（未填写）'}</td></tr>
    <tr><td>可复用方法</td><td>${r.summary_reuse||'（未填写）'}</td></tr>
    ${goalRows}
    <tr><td>需停止的行为</td><td>${r.stop_behavior||'—'}</td></tr>
    <tr><td>备注</td><td>${r.notes||'—'}</td></tr>
  </table>`;
}

function dimFormRow(field, label, placeholder, d) {

let actionCount = 3;
function buildActionRows(items) {
  actionCount = items.length;
  const header = `<div class="action-row-form" style="background:var(--surface2)">
    <div class="action-cell action-cell-header">#</div>
    <div class="action-cell action-cell-header">改进内容</div>
    <div class="action-cell action-cell-header">优先级</div>
    <div class="action-cell action-cell-header">完成时限</div>
    <div class="action-cell action-cell-header">验收标准</div>
    <div class="action-cell action-cell-header">备注</div>
  </div>`;
  const rows = items.map((it,i) => `<div class="action-row-form" id="arow-${i}">
    <div class="action-cell" style="display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3)">${i+1}</div>
    <div class="action-cell"><input placeholder="改进内容" value="${it.content||''}" onchange="updateAction(${i},'content',this.value)"></div>
    <div class="action-cell"><select onchange="updateAction(${i},'priority',this.value)">
      <option value="高" ${it.priority==='高'?'selected':''}>高</option>
      <option value="中" ${it.priority==='中'?'selected':''}>中</option>
      <option value="低" ${(it.priority==='低'||!it.priority)?'selected':''}>低</option>
    </select></div>
    <div class="action-cell"><input type="date" value="${it.deadline||''}" onchange="updateAction(${i},'deadline',this.value)"></div>
    <div class="action-cell"><input placeholder="验收标准" value="${it.criteria||''}" onchange="updateAction(${i},'criteria',this.value)"></div>
    <div class="action-cell"><input placeholder="备注" value="${it.note||''}" onchange="updateAction(${i},'note',this.value)"></div>
  </div>`).join('');
  return header + rows;
}

function addActionRow() {
  if (!formData.actionItems) formData.actionItems = [];
  formData.actionItems.push({});
  document.getElementById('action-rows-container').innerHTML = buildActionRows(formData.actionItems);
}
function updateAction(i, field, val) {
  if (!formData.actionItems) formData.actionItems = [];
  if (!formData.actionItems[i]) formData.actionItems[i] = {};
  formData.actionItems[i][field] = val;
}

// ---- Next Goals ----
function getNextGoals(d) {
  if (d.nextGoals && d.nextGoals.length) return [...d.nextGoals];
  // backward compat with old format
  const goals = [];
  if (d.next_goal1) goals.push(d.next_goal1);
  if (d.next_goal2) goals.push(d.next_goal2);
  if (d.next_goal3) goals.push(d.next_goal3);
  return goals.length ? goals : ['', '', ''];
}
function buildGoalRows(goals) {
  return goals.map((g, i) => `<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center" id="goal-row-${i}">
    <span style="font-size:12px;color:var(--text3);min-width:18px;text-align:right">${i+1}.</span>
    <input class="form-input" style="flex:1" placeholder="目标${i+1}" value="${g.replace(/"/g,'&quot;')}" oninput="updateGoal(${i},this.value)">
    ${goals.length > 1 ? `<button class="btn btn-sm" style="padding:5px 8px;color:var(--text3)" onclick="removeNextGoal(${i})" title="删除">
      <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>` : ''}
  </div>`).join('');
}
function addNextGoal() {
  collectGoals();
  if (!formData.nextGoals) formData.nextGoals = ['', '', ''];
  formData.nextGoals.push('');
  document.getElementById('next-goals-container').innerHTML = buildGoalRows(formData.nextGoals);
}
function removeNextGoal(i) {
  collectGoals();
  if (!formData.nextGoals || formData.nextGoals.length <= 1) return;
  formData.nextGoals.splice(i, 1);
  document.getElementById('next-goals-container').innerHTML = buildGoalRows(formData.nextGoals);
}
function updateGoal(i, val) {
  if (!formData.nextGoals) formData.nextGoals = [];
  formData.nextGoals[i] = val;
}
function collectGoals() {
  const container = document.getElementById('next-goals-container');
  if (!container) return;
  const inputs = container.querySelectorAll('input');
  formData.nextGoals = Array.from(inputs).map(el => el.value);
}

function renderProgress() {
  const html = STEPS.map((s, i) => {
    const done = i < currentStep;
    const active = i === currentStep;
    const line = i < STEPS.length - 1 ? `<div class="step-line ${done?'done':''}"></div>` : '';
    return `<div class="progress-step">
      <div class="step-dot ${done?'done':''} ${active?'active':''}" onclick="goToStep(${i})">
        ${done ? '✓' : i+1}
      </div>
      <span class="step-label ${done?'done':''} ${active?'active':''}">${s.short}</span>
      ${line}
    </div>`;
  }).join('');
  document.getElementById('form-progress').innerHTML = html;
  document.getElementById('step-indicator').textContent = `第 ${currentStep+1} 步，共 ${STEPS.length} 步`;
  document.getElementById('btn-prev').style.display = currentStep > 0 ? '' : 'none';
  document.getElementById('btn-next').style.display = currentStep < STEPS.length-1 ? '' : 'none';
  document.getElementById('btn-save').style.display = currentStep === STEPS.length-1 ? '' : 'none';
}

function goToStep(step) {
  collectCurrentStep();
  currentStep = step;
  document.querySelectorAll('.form-section').forEach((s, i) => {
    s.classList.toggle('active', i === currentStep);
  });
  renderProgress();
}

function nextStep() {
  collectCurrentStep();
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    document.querySelectorAll('.form-section').forEach((s, i) => s.classList.toggle('active', i === currentStep));
    renderProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
function prevStep() {
  collectCurrentStep();
  if (currentStep > 0) {
    currentStep--;
    document.querySelectorAll('.form-section').forEach((s, i) => s.classList.toggle('active', i === currentStep));
    renderProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

const FORM_FIELDS = [
  'title','reviewer','startDate','endDate','weekNum','reviewDate','participants',
  'dim1_highlight','dim1_issue','dim1_root','dim1_action',
  'dim2_highlight','dim2_issue','dim2_root','dim2_action',
  'dim3_priority','dim3_risk','dim3_root','dim3_action',
  'dim4_issue','dim4_direction','dim4_action',
  'summary_exp','summary_avoid','summary_reuse',
  'stop_behavior','notes'
];

function collectCurrentStep() {
  FORM_FIELDS.forEach(f => {
    if (f === 'reviewer') {
      // handled separately via multi-select
      return;
    }
    const el = document.getElementById('f-' + f);
    if (el) formData[f] = el.value;
  });
  // Collect reviewer from multi-select
  const reviewerWrap = document.getElementById('f-reviewer-ms');
  if (reviewerWrap) {
    const vals = getMsValues('f-reviewer-ms');
    formData.reviewer = vals.join(', ');
  }
  collectGoals();
  if (!formData.actionItems) formData.actionItems = [];
}

function loadFormData(id) {
  const r = db.find(x => x.id === id);
  if (!r) return;
  formData = { ...r };
  // normalize goals
  if (!formData.nextGoals || !formData.nextGoals.length) {
    formData.nextGoals = getNextGoals(formData);
  }
}

async function saveForm() {
  collectCurrentStep();
  // Collect reviewer one more time in case user is still on step 0
  const reviewerWrap = document.getElementById('f-reviewer-ms');
  if (reviewerWrap) {
    const vals = getMsValues('f-reviewer-ms');
    if (vals.length) formData.reviewer = vals.join(', ');
  }
  if (!formData.reviewer || !formData.reviewer.trim()) { showToast('请选择复盘人', 'error'); goToStep(0); return; }
  if (!formData.startDate) { showToast('请填写开始日期', 'error'); goToStep(0); return; }
  try {
    if (editingId) {
      const updated = { ...formData, id: editingId, updatedAt: new Date().toISOString() };
      await saveRecord(updated);
      showToast('复盘已更新', 'success');
    } else {
      const rec = { ...formData, id: Date.now().toString(), createdAt: new Date().toISOString() };
      if (rec.startDate) { const d = new Date(rec.startDate); rec.startYear = d.getFullYear(); rec.startMonth = d.getMonth()+1; }
      await saveRecord(rec);
      showToast('复盘已保存', 'success');
    }
    formData = {}; editingId = null;
    setTimeout(() => showView('list'), 800);
  } catch (e) {
    showToast('保存失败：' + e.message, 'error');
  }
}

// ======== STATS ========
function renderStats() {
  const total = db.length;
  const thisYear = db.filter(r => new Date(r.createdAt).getFullYear() === new Date().getFullYear()).length;
  const withActions = db.filter(r => r.actionItems && r.actionItems.length > 0).length;
  const avgActions = total ? Math.round(db.reduce((s,r)=>s+(r.actionItems||[]).length,0)/total*10)/10 : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">累计复盘次数</div><div class="stat-value">${total}</div><div class="stat-sub">份记录</div></div>
    <div class="stat-card"><div class="stat-label">今年复盘次数</div><div class="stat-value">${thisYear}</div><div class="stat-sub">份记录</div></div>
    <div class="stat-card"><div class="stat-label">含行动计划</div><div class="stat-value">${withActions}</div><div class="stat-sub">份复盘</div></div>
    <div class="stat-card"><div class="stat-label">平均行动数</div><div class="stat-value">${avgActions}</div><div class="stat-sub">条/次</div></div>
  `;

  // Monthly chart
  const months = Array.from({length:12},(_,i)=>i+1);
  const counts = months.map(m => db.filter(r => {
    const d = new Date(r.createdAt);
    return d.getFullYear() === new Date().getFullYear() && d.getMonth()+1 === m;
  }).length);
  const max = Math.max(...counts, 1);

  const barHTML = months.map((m,i) => `<div class="bar-row">
    <div class="bar-label">${m}月</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(counts[i]/max)*100}%">
      ${counts[i] > 0 ? `<span class="bar-val">${counts[i]}</span>` : ''}
    </div></div>
  </div>`).filter((_,i) => i < new Date().getMonth()+1).join('');

  // Priority dist
  const allItems = db.flatMap(r => r.actionItems || []);
  const priorities = {高:0,中:0,低:0};
  allItems.forEach(it => { if (it.priority) priorities[it.priority]++; });
  const pTotal = allItems.length || 1;
  const priorityBars = Object.entries(priorities).map(([p,c]) => `<div class="bar-row">
    <div class="bar-label">${p}优先级</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(c/pTotal)*100}%;background:${p==='高'?'#9b1c1c':p==='中'?'#92400e':'#2d6a4f'}">
      ${c > 0 ? `<span class="bar-val">${c}</span>` : ''}
    </div></div>
  </div>`).join('');

  document.getElementById('stats-charts').innerHTML = `
    <div class="chart-card"><div class="chart-title">今年复盘频率（按月）</div><div class="bar-chart">${barHTML || '<div style="color:var(--text3);font-size:13px">暂无数据</div>'}</div></div>
    <div class="chart-card"><div class="chart-title">行动计划优先级分布</div><div class="bar-chart">${priorityBars || '<div style="color:var(--text3);font-size:13px">暂无数据</div>'}</div></div>
  `;
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ======== THEME ========
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('theme', next);
  if (ELECTRON_AVAILABLE) {
    window.electronAPI.getSettings().then(s => { s.theme = next; window.electronAPI.saveSettings(s); }).catch(() => {});
  }
}
function applyTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-icon-sun').style.display = '';
    document.getElementById('theme-icon-moon').style.display = 'none';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-icon-sun').style.display = 'none';
    document.getElementById('theme-icon-moon').style.display = '';
  }
}

// ======== SETTINGS VIEW ========

    try { dataDirDisplay = await window.electronAPI.getDataDir(); } catch { dataDirDisplay = '默认目录'; }
  } else {
    dataDirDisplay = dataFolderHandle ? ('已连接: ' + dataFolderHandle.name) : '本地浏览器存储 (localStorage)';
  }

  const container = document.getElementById('settings-content');
  container.innerHTML = `
    <div class="settings-container">

          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>

        </div>
        <div class="settings-section-desc">选择你偏好的界面主题，设置后将自动应用并记住你的选择</div>
        <div class="settings-row">
          <div>
            <div class="settings-row-label">界面主题</div>
            <div class="settings-row-sub">切换亮色或暗色模式</div>
          </div>
          <div class="settings-row-value">
            <button class="theme-option ${currentTheme === 'light' || !currentTheme ? 'active' : ''}" onclick="applyThemeSetting('light')">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
              暗色

        <div class="settings-section-desc">设置项目数据的存储目录，所有复盘记录都保存在此目录下</div>

        </div>

          <div class="settings-path" id="settings-data-path" title="${escHtml(dataDirDisplay)}">${escHtml(dataDirDisplay)}</div>
          ${ELECTRON_AVAILABLE ? `
            <button class="settings-btn settings-btn-primary" onclick="changeDataDir()">更改目录</button>
            <button class="settings-reset-btn" onclick="resetDataDir()">恢复默认</button>
          ` : (FSA_AVAILABLE ? `
            <button class="settings-btn settings-btn-primary" onclick="selectDataFolder().then(()=>renderSettingsView())">选择文件夹</button>

async function applyThemeSetting(theme) {
  applyTheme(theme);
  localStorage.setItem('theme', theme);
  if (ELECTRON_AVAILABLE) {
    try {
      const settings = await window.electronAPI.getSettings();
      settings.theme = theme;
      await window.electronAPI.saveSettings(settings);
    } catch {}
  }
  renderSettingsView();
}

async function changeDataDir() {
  if (!ELECTRON_AVAILABLE) return;
  const selected = await window.electronAPI.selectDataDir();
  if (!selected) return;
  try {
    const settings = await window.electronAPI.getSettings();
    settings.dataDir = selected;
    await window.electronAPI.saveSettings(settings);
    showToast('数据目录已更改，重新加载数据中...', 'success');
    await loadFromFS();
    await loadPeopleFromFS();
    renderSettingsView();
  } catch (e) {
    showToast('更改目录失败：' + e.message, 'error');
  }
}

async function resetDataDir() {
  if (!ELECTRON_AVAILABLE) return;
  if (!confirm('确认恢复为默认数据目录？')) return;
  try {
    const settings = await window.electronAPI.getSettings();
    delete settings.dataDir;
    await window.electronAPI.saveSettings(settings);
    showToast('已恢复默认数据目录，重新加载数据中...', 'success');
    await loadFromFS();
    await loadPeopleFromFS();
    renderSettingsView();
  } catch (e) {
    showToast('操作失败：' + e.message, 'error');
  }
}

// ======== APP INIT ========
async function initApp() {
  // Apply saved theme (Electron: from settings.json, browser: from localStorage)
  let savedTheme = localStorage.getItem('theme') || 'light';
  if (ELECTRON_AVAILABLE) {
    try {
      const settings = await window.electronAPI.getSettings();
      if (settings.theme) { savedTheme = settings.theme; localStorage.setItem('theme', savedTheme); }
    } catch {}
  }
  applyTheme(savedTheme);

  if (ELECTRON_AVAILABLE) {
    // Electron: 直接使用本地文件系统，无需 FSA
    updateFolderUI(true);
  } else {
    // Try to restore folder connection
    await tryRestoreFolder();
    updateFolderUI(!!dataFolderHandle);
  }

  if (ELECTRON_AVAILABLE || dataFolderHandle) {
    await loadFromFS();
    await loadPeopleFromFS();
    await seedIfEmpty();
  }
  showView('list');
}

initApp();
</script>
