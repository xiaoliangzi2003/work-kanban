<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0eeea;
  --border: rgba(30,30,30,0.1);
  --border2: rgba(30,30,30,0.18);
  --text: #1a1a1a;
  --text2: #5a5a5a;
  --text3: #999;
  --accent: #1F4E79;
  --accent2: #2E75B6;
  --accent-light: #e8f0f8;
  --accent-mid: #b8d0ea;
  --green: #2d6a4f;
  --green-bg: #e8f5ee;
  --amber: #92400e;
  --amber-bg: #fef3c7;
  --red: #9b1c1c;
  --red-bg: #fee2e2;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow2: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="dark"] {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #283548;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #2563eb;
  --accent2: #60a5fa;
  --accent-light: #1e3252;
  --accent-mid: rgba(96,165,250,0.2);
  --green: #4ade80;
  --green-bg: #052e16;
  --amber: #fbbf24;
  --amber-bg: #1c1400;
  --red: #f87171;
  --red-bg: #2d0000;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow2: 0 8px 32px rgba(0,0,0,0.5);
}
[data-theme="dark"] .sidebar { background: #1e3252; }
[data-theme="dark"] .folder-banner { background: #1c1400; border-color: #92400e; color: #fbbf24; }
[data-theme="dark"] .folder-banner button { background: #1e293b; color: #fbbf24; border-color: #92400e; }
[data-theme="dark"] .folder-banner button:hover { background: #283548; }
[data-theme="dark"] .kanban-col { background: var(--surface2); }
[data-theme="dark"] .task-card { background: var(--surface); }

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ======== LAYOUT ======== */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px;
  background: var(--accent);
  color: #fff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  transition: var(--transition);
}
.sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.12); }
.sidebar-logo h1 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; letter-spacing: 0.3px; line-height: 1.3; color: #fff; }
.sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; letter-spacing: 0.8px; text-transform: uppercase; }
.sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; cursor: pointer; color: rgba(255,255,255,0.65); font-size: 13.5px; transition: var(--transition); border-left: 3px solid transparent; }
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-item.active { color: #fff; background: rgba(255,255,255,0.12); border-left-color: rgba(255,255,255,0.7); }
.nav-icon { width: 18px; height: 18px; opacity: 0.9; flex-shrink: 0; }
.sidebar-switch { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.12); display: flex; flex-direction: column; gap: 4px; }
.switch-label { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.8px; text-transform: uppercase; padding: 0 8px; margin-bottom: 2px; }
.switch-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius-sm); font-size: 12.5px; color: rgba(255,255,255,0.55); text-decoration: none; transition: var(--transition); cursor: pointer; }
.switch-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.switch-item.active { background: rgba(255,255,255,0.12); color: #fff; }
.switch-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 11px; color: rgba(255,255,255,0.4); }

.main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* ======== FOLDER BANNER ======== */
.folder-banner { background: #fef3c7; border-bottom: 1px solid #f59e0b; padding: 10px 32px; display: flex; align-items: center; gap: 12px; font-size: 13px; color: #92400e; }
.folder-banner button { padding: 4px 14px; border-radius: var(--radius-sm); border: 1px solid #f59e0b; background: #fff; color: #92400e; font-size: 12px; font-family: inherit; cursor: pointer; transition: var(--transition); }
.folder-banner button:hover { background: #fef3c7; }

.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: 17px; font-weight: 500; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
.breadcrumb-sep { color: var(--text3); }
.breadcrumb-link { cursor: pointer; color: var(--accent2); }
.breadcrumb-link:hover { text-decoration: underline; }
.topbar-actions { display: flex; gap: 10px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text); transition: var(--transition); font-weight: 500; }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #163d61; border-color: #163d61; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.theme-toggle { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
.theme-toggle:hover { background: var(--surface2); color: var(--text); }
.content { padding: 28px 32px; flex: 1; }

/* ======== VIEWS ======== */
.view { display: none; animation: fadeIn 0.25s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ======== DASHBOARD ======== */
.dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.stat-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.3px; }
.stat-value { font-size: 28px; font-weight: 300; color: var(--accent); font-family: 'DM Serif Display', serif; }
.stat-sub { font-size: 11.5px; color: var(--text3); margin-top: 4px; }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.dash-card-title { font-size: 13.5px; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.dash-empty { font-size: 12px; color: var(--text3); text-align: center; padding: 20px 0; }
.dash-list { display: flex; flex-direction: column; gap: 8px; }
.dash-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); background: var(--surface2); font-size: 13px; cursor: pointer; transition: var(--transition); }
.dash-list-item:hover { background: var(--accent-light); }
.dash-list-item-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dash-list-item-meta { font-size: 11px; color: var(--text3); flex-shrink: 0; }

/* ======== PROJECT LIST ======== */
.list-controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.search-box input { width: 100%; padding: 9px 14px 9px 36px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: var(--transition); }
.search-box input:focus { border-color: var(--accent2); }
.filter-select { padding: 9px 14px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; cursor: pointer; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: var(--transition); position: relative; }
.project-card:hover { box-shadow: var(--shadow2); transform: translateY(-1px); border-color: var(--accent-mid); }
.project-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
.project-card-name { font-size: 15px; font-weight: 500; line-height: 1.4; flex: 1; }
.project-card-desc { font-size: 12.5px; color: var(--text2); margin-bottom: 14px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; min-height: 36px; }
.project-card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.project-card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
.progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; transition: width 0.5s ease; }
.empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; font-weight: 400; margin-bottom: 8px; color: var(--text2); }
.empty-state p { font-size: 13px; margin-bottom: 20px; }

/* ======== TAGS / BADGES ======== */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-status-planning { background: var(--surface2); color: var(--text2); }
.badge-status-active { background: #dbeafe; color: #1e40af; }
.badge-status-paused { background: var(--amber-bg); color: var(--amber); }
.badge-status-done { background: var(--green-bg); color: var(--green); }
.badge-priority-urgent { background: #ffd7d7; color: #7f0000; }
.badge-priority-high { background: var(--red-bg); color: var(--red); }
.badge-priority-medium { background: var(--amber-bg); color: var(--amber); }
.badge-priority-low { background: var(--green-bg); color: var(--green); }
[data-theme="dark"] .badge-priority-urgent { background: #5c0000; color: #ffb3b3; }

/* ======== MULTI-SELECT ======== */
.ms-wrap { position: relative; user-select: none; }
.ms-trigger { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; font-size: 13px; min-height: 36px; }
.ms-trigger:focus-within { border-color: var(--accent2); }
.ms-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); z-index: 200; max-height: 200px; overflow-y: auto; box-shadow: var(--shadow2); display: none; }
.ms-wrap.open .ms-dropdown { display: block; }
.ms-option { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; }
.ms-option:hover { background: var(--surface2); }
.ms-option input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent2); }
.ms-placeholder { color: var(--text3); }
.ms-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.ms-tag { background: var(--accent-light); color: var(--accent2); padding: 1px 8px; border-radius: 20px; font-size: 11px; }

/* ======== PEOPLE VIEW ======== */
.people-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.people-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 500; color: var(--text3); border-bottom: 2px solid var(--border); }
.people-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.people-table tr:last-child td { border-bottom: none; }
.people-table tr:hover td { background: var(--surface2); }

/* ======== SUBPROJECT ROLES ======== */
.role-section { margin-bottom: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: visible; }
.role-section-header { padding: 8px 12px; background: var(--surface2); font-size: 12px; font-weight: 500; color: var(--text2); }
.role-section-body { padding: 10px 12px; }
.role-progress-wrap { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.role-progress-wrap input[type=range] { flex: 1; accent-color: var(--accent2); }
.role-progress-wrap span { font-size: 13px; font-weight: 500; color: var(--accent2); min-width: 36px; text-align: right; }
.sp-roles-display { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
.sp-role-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.sp-role-label { min-width: 52px; color: var(--text3); flex-shrink: 0; }
.sp-role-people { flex: 1; color: var(--text2); }
.sp-role-progress-bar { width: 60px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.sp-role-progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; }
.sp-role-pct { min-width: 28px; text-align: right; color: var(--text3); }
.badge-risk-high { background: var(--red-bg); color: var(--red); }
.badge-risk-medium { background: var(--amber-bg); color: var(--amber); }
.badge-risk-low { background: var(--green-bg); color: var(--green); }
[data-theme="dark"] .badge-status-active { background: #1e3a8a; color: #93c5fd; }

/* ======== PROJECT DETAIL ======== */
.detail-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
.detail-hero-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 16px; }
.detail-hero-title { font-size: 22px; font-weight: 500; font-family: 'DM Serif Display', serif; flex: 1; }
.detail-hero-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.detail-hero-desc { font-size: 13.5px; color: var(--text2); margin-bottom: 16px; }
.detail-meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.detail-meta-item { }
.detail-meta-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.detail-meta-value { font-size: 13px; font-weight: 500; }
.detail-progress-section { margin-top: 16px; }
.detail-progress-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.detail-progress-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.detail-progress-fill { height: 100%; background: var(--accent2); border-radius: 4px; transition: width 0.5s ease; }
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; gap: 0; }
.tab { padding: 10px 20px; font-size: 13.5px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent2); border-bottom-color: var(--accent2); font-weight: 500; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.2s ease; }

/* ======== SUBPROJECTS ======== */
.subproject-list { display: flex; flex-direction: column; gap: 10px; }
.subproject-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.subproject-item-info { flex: 1; min-width: 0; }
.subproject-item-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.subproject-item-meta { font-size: 11.5px; color: var(--text3); display: flex; gap: 10px; }
.subproject-item-progress { width: 100px; flex-shrink: 0; }
.subproject-item-progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.subproject-item-progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; }
.subproject-item-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ======== RISK TABLE ======== */
.risk-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.risk-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 500; color: var(--text3); border-bottom: 2px solid var(--border); letter-spacing: 0.3px; }
.risk-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.risk-table tr:last-child td { border-bottom: none; }
.risk-table tr:hover td { background: var(--surface2); }
.risk-actions { display: flex; gap: 6px; }
.icon-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn.delete:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }

/* ======== KANBAN BOARD ======== */
.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; min-height: 400px; }
.kanban-col { background: var(--surface2); border-radius: var(--radius); padding: 14px; min-height: 120px; }
.kanban-col-header { font-size: 12.5px; font-weight: 500; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
.kanban-col-count { font-size: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1px 8px; color: var(--text3); }
.kanban-col.drag-over { background: var(--accent-light); outline: 2px dashed var(--accent-mid); }
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; cursor: grab; transition: var(--transition); }
.task-card:hover { box-shadow: var(--shadow); border-color: var(--accent-mid); }
.task-card.dragging { opacity: 0.5; cursor: grabbing; }
.task-card-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
.task-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.task-card-project { font-size: 10.5px; color: var(--text3); background: var(--surface2); padding: 1px 6px; border-radius: 4px; }
.task-card-due { font-size: 10.5px; color: var(--text3); }
.task-card-due.overdue { color: var(--red); }
.add-task-btn { width: 100%; padding: 7px; border: 1px dashed var(--border2); border-radius: var(--radius-sm); background: transparent; color: var(--text3); font-size: 12px; font-family: inherit; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 4px; }
.add-task-btn:hover { background: var(--surface); color: var(--text2); border-color: var(--border2); }

/* ======== MODAL ======== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 560px; box-shadow: var(--shadow2); max-height: 90vh; overflow-y: auto; }
.modal-lg { max-width: 720px; }
.modal h3 { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.form-row { display: grid; gap: 14px; margin-bottom: 14px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
.form-label .required { color: var(--red); }
.form-control { padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: var(--transition); }
.form-control:focus { border-color: var(--accent2); }
textarea.form-control { resize: vertical; min-height: 72px; line-height: 1.6; }
.form-divider { font-size: 12px; font-weight: 500; color: var(--text3); margin: 16px 0 10px; text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.progress-input-wrap { display: flex; align-items: center; gap: 10px; }
.progress-input-wrap input[type=range] { flex: 1; accent-color: var(--accent2); }
.progress-input-wrap span { font-size: 13px; font-weight: 500; color: var(--accent2); min-width: 36px; text-align: right; }

/* ======== CONFIRM MODAL ======== */
.confirm-modal { max-width: 400px; }
.confirm-modal p { font-size: 13.5px; color: var(--text2); margin-bottom: 20px; }

/* ======== TOAST ======== */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--surface); padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; box-shadow: var(--shadow2); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.25s ease, transform 0.25s ease; transform: translateY(8px); }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* ======== SECTION HEADER ======== */
.section-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 15px; font-weight: 500; }
</style>
</head>
<body>

<div class="app">

        项目列表
      </div>
      <div class="nav-item" data-view="board" onclick="showView('board')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
        看板

        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>

      <div class="nav-item" data-view="people" onclick="showView('people')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        人员管理
      </div>
    </div>
    <div class="sidebar-switch">
      <div class="switch-label">切换系统</div>
      <a class="switch-item" href="Index.html">
        <span class="switch-dot"></span>
        工作复盘
      </a>
      <span class="switch-item active">
        <span class="switch-dot"></span>
        项目看板
      </span>
    </div>
    <div class="sidebar-footer">
      <div id="folder-status-text">数据存储于本地浏览器</div>
      <div id="connect-folder-btn-wrap" style="display:none;margin-top:8px">
        <button onclick="selectDataFolder()" style="width:100%;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:11px;font-family:inherit;cursor:pointer;">
          连接文件夹
        </button>
      </div>
    </div>
  </nav>

  <div class="main">
    <!-- Folder Banner -->
    <div class="folder-banner" id="folder-banner" style="display:none">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      请选择数据文件夹，项目数据将以 JSON 文件存储在 data/projects/ 目录下
      <button onclick="selectDataFolder()">选择文件夹</button>

    <!-- Topbar -->
    <div class="topbar">

        </button>
        <button class="btn btn-primary" id="topbar-new-btn" onclick="openProjectForm(null)">

    <div class="content">
      <!-- DASHBOARD VIEW -->

      </div>

      <!-- LIST VIEW -->
      <div id="view-list" class="view">

            <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>

            <option value="planning">规划中</option>

            <option value="paused">已暂停</option>
            <option value="done">已完成</option>

            <option value="">所有优先级</option>
            <option value="urgent">紧急</option>
            <option value="high">高</option>
            <option value="medium">中</option>
            <option value="low">低</option>
          </select>

        <div id="projects-container"></div>
      </div>

      <!-- DETAIL VIEW -->
      <div id="view-detail" class="view">
        <div id="detail-content"></div>
      </div>

      <!-- BOARD VIEW -->
      <div id="view-board" class="view">
        <div class="list-controls">
          <div class="search-box">
            <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" placeholder="搜索任务..." id="board-search" oninput="renderBoard()">
          </div>
          <select class="filter-select" id="board-filter-project" onchange="renderBoard()">
            <option value="">所有项目</option>
          </select>
        </div>
        <div class="board" id="board-container"></div>
      </div>

      <!-- RISKS VIEW -->
      <div id="view-risks" class="view">
        <div id="risks-content"></div>
      </div>

      <!-- PEOPLE VIEW -->
      <div id="view-people" class="view">
        <div id="people-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- Project Form Modal -->
<div class="modal-overlay" id="project-modal">
  <div class="modal modal-lg">
    <h3 id="project-modal-title">新建项目</h3>
    <div class="modal-sub" id="project-modal-sub">填写项目基本信息</div>
    <div class="form-row form-row-2">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">项目名称 <span class="required">*</span></label>
        <input class="form-control" id="f-name" placeholder="输入项目名称">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">项目描述</label>
        <textarea class="form-control" id="f-desc" placeholder="简要说明项目目标和背景"></textarea>
      </div>
    </div>
    <div class="form-row form-row-3">
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-control" id="f-status">
          <option value="planning">规划中</option>
          <option value="active">进行中</option>
          <option value="paused">已暂停</option>
          <option value="done">已完成</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">优先级</label>
        <select class="form-control" id="f-priority">
          <option value="urgent">紧急</option>
          <option value="high">高</option>
          <option value="medium" selected>中</option>
          <option value="low">低</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">负责人</label>
        <div class="ms-wrap" id="f-owner-ms">
          <div class="ms-trigger" onclick="toggleMs('f-owner-ms')">
            <div class="ms-tags" id="f-owner-ms-tags"><span class="ms-placeholder">选择负责人</span></div>
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="ms-dropdown" id="f-owner-ms-dropdown"></div>
        </div>
      </div>
    </div>
    <div class="form-row form-row-3">
      <div class="form-group">
        <label class="form-label">开始日期</label>
        <input class="form-control" type="date" id="f-start">
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input class="form-control" type="date" id="f-due">
      </div>
      <div class="form-group">
        <label class="form-label">实际完成日期</label>
        <input class="form-control" type="date" id="f-completed">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">整体进度</label>
        <div class="progress-input-wrap">
          <input type="range" min="0" max="100" step="5" id="f-progress" value="0" oninput="document.getElementById('f-progress-val').textContent=this.value+'%'">
          <span id="f-progress-val">0%</span>
        </div>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">
        <label class="form-label">标签</label>
        <input class="form-control" id="f-tags" placeholder="多个标签用逗号分隔">
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <input class="form-control" id="f-notes" placeholder="其他补充说明">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('project-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveProjectForm()">保存项目</button>
    </div>
  </div>
</div>

<!-- SubProject Form Modal -->
<div class="modal-overlay" id="subproject-modal">
  <div class="modal modal-lg">
    <h3 id="subproject-modal-title">新建子项目</h3>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">名称 <span class="required">*</span></label>
        <input class="form-control" id="sf-name" placeholder="子项目名称">

    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">描述</label>
        <textarea class="form-control" id="sf-desc" placeholder="子项目描述"></textarea>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">

          <option value="pending_design">待产品设计</option>
          <option value="pending_dev">待开发</option>
          <option value="developing">开发中</option>
          <option value="integration">联调中</option>
          <option value="testing">测试中</option>
          <option value="done">已完成</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">优先级</label>
        <select class="form-control" id="sf-priority">
          <option value="urgent">紧急</option>
          <option value="high">高</option>
          <option value="medium" selected>中</option>
          <option value="low">低</option>
        </select>

    <div class="form-row form-row-2">
      <div class="form-group">
        <label class="form-label">开始日期</label>
        <input class="form-control" type="date" id="sf-start">
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <input class="form-control" type="date" id="sf-due">
      </div>
    </div>
    <div class="form-divider">角色分配与进度</div>
    <!-- Product Design Role -->
    <div class="role-section">
      <div class="role-section-header">产品设计</div>
      <div class="role-section-body">
        <div class="ms-wrap" id="sf-role-product_design-ms">
          <div class="ms-trigger" onclick="toggleMs('sf-role-product_design-ms')">
            <div class="ms-tags" id="sf-role-product_design-ms-tags"><span class="ms-placeholder">选择产品设计人员</span></div>
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="ms-dropdown" id="sf-role-product_design-ms-dropdown"></div>
        </div>
        <div class="role-progress-wrap" style="margin-top:8px">
          <input type="range" min="0" max="100" step="5" id="sf-prog-product_design" value="0" oninput="document.getElementById('sf-prog-product_design-val').textContent=this.value+'%'">
          <span id="sf-prog-product_design-val">0%</span>
        </div>
      </div>
    </div>
    <!-- Frontend Role -->
    <div class="role-section">
      <div class="role-section-header">前端</div>
      <div class="role-section-body">
        <div class="ms-wrap" id="sf-role-frontend-ms">
          <div class="ms-trigger" onclick="toggleMs('sf-role-frontend-ms')">
            <div class="ms-tags" id="sf-role-frontend-ms-tags"><span class="ms-placeholder">选择前端人员</span></div>
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="ms-dropdown" id="sf-role-frontend-ms-dropdown"></div>
        </div>
        <div class="role-progress-wrap" style="margin-top:8px">
          <input type="range" min="0" max="100" step="5" id="sf-prog-frontend" value="0" oninput="document.getElementById('sf-prog-frontend-val').textContent=this.value+'%'">
          <span id="sf-prog-frontend-val">0%</span>
        </div>
      </div>
    </div>
    <!-- Backend Role -->
    <div class="role-section">
      <div class="role-section-header">后端</div>
      <div class="role-section-body">
        <div class="ms-wrap" id="sf-role-backend-ms">
          <div class="ms-trigger" onclick="toggleMs('sf-role-backend-ms')">
            <div class="ms-tags" id="sf-role-backend-ms-tags"><span class="ms-placeholder">选择后端人员</span></div>
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="ms-dropdown" id="sf-role-backend-ms-dropdown"></div>
        </div>
        <div class="role-progress-wrap" style="margin-top:8px">
          <input type="range" min="0" max="100" step="5" id="sf-prog-backend" value="0" oninput="document.getElementById('sf-prog-backend-val').textContent=this.value+'%'">
          <span id="sf-prog-backend-val">0%</span>
        </div>
      </div>
    </div>
    <!-- Testing Role -->
    <div class="role-section">
      <div class="role-section-header">测试</div>
      <div class="role-section-body">
        <div class="ms-wrap" id="sf-role-testing-ms">
          <div class="ms-trigger" onclick="toggleMs('sf-role-testing-ms')">
            <div class="ms-tags" id="sf-role-testing-ms-tags"><span class="ms-placeholder">选择测试人员</span></div>
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
          <div class="ms-dropdown" id="sf-role-testing-ms-dropdown"></div>
        </div>
        <div class="role-progress-wrap" style="margin-top:8px">
          <input type="range" min="0" max="100" step="5" id="sf-prog-testing" value="0" oninput="document.getElementById('sf-prog-testing-val').textContent=this.value+'%'">
          <span id="sf-prog-testing-val">0%</span>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('subproject-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveSubProjectForm()">保存</button>
    </div>
  </div>
</div>

<!-- Risk Form Modal -->
<div class="modal-overlay" id="risk-modal">
  <div class="modal">
    <h3 id="risk-modal-title">新建风险</h3>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">风险描述 <span class="required">*</span></label>
        <textarea class="form-control" id="rf-desc" placeholder="描述具体风险内容"></textarea>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">
        <label class="form-label">影响程度</label>
        <select class="form-control" id="rf-impact">
          <option value="high">高</option>
          <option value="medium" selected>中</option>
          <option value="low">低</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">发生概率</label>
        <select class="form-control" id="rf-probability">
          <option value="high">高</option>
          <option value="medium" selected>中</option>
          <option value="low">低</option>
        </select>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">
        <label class="form-label">应对策略</label>
        <select class="form-control" id="rf-strategy">
          <option value="avoid">规避</option>
          <option value="mitigate" selected>减轻</option>
          <option value="accept">接受</option>
          <option value="transfer">转移</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-control" id="rf-status">
          <option value="pending">待处理</option>
          <option value="monitoring">监控中</option>
          <option value="closed">已关闭</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">缓解措施</label>
        <textarea class="form-control" id="rf-mitigation" placeholder="具体行动描述"></textarea>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">责任人</label>
        <input class="form-control" id="rf-owner" placeholder="责任人">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('risk-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveRiskForm()">保存</button>
    </div>
  </div>
</div>

<!-- Task Form Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3 id="task-modal-title">新建任务</h3>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">任务标题 <span class="required">*</span></label>
        <input class="form-control" id="tf-title" placeholder="输入任务标题">
      </div>
    </div>

<script>
// ======== STATE ========
const IDB_NAME = 'weekly_review_idb';
const IDB_STORE = 'handles';
let projects = [];
let people = [];
let dataFolderHandle = null;
let dataRootHandle = null;
let currentView = 'dashboard';
let currentProjectId = null;
let currentDetailTab = 'subprojects';
let editingProjectId = null;
let editingSubProjectId = null;
let editingRiskId = null;
let editingTaskId = null;
let editingPersonId = null;
let taskFormProjectId = null;
let taskFormStatus = 'todo';
let pendingConfirmFn = null;
let peopleCurrentPage = 1;
const PEOPLE_PER_PAGE = 10;

const FSA_AVAILABLE = ('showDirectoryPicker' in window);

const STATUS_LABELS = { planning:'规划中', active:'进行中', paused:'已暂停', done:'已完成' };
const PRIORITY_LABELS = { urgent:'紧急', high:'高', medium:'中', low:'低' };
const STRATEGY_LABELS = { avoid:'规避', mitigate:'减轻', accept:'接受', transfer:'转移' };
const RISK_STATUS_LABELS = { pending:'待处理', monitoring:'监控中', closed:'已关闭' };
const TASK_STATUS_LABELS = { todo:'待办', doing:'进行中', review:'待验证', done:'已完成' };
const TASK_COLS = ['todo','doing','review','done'];
const TASK_TYPE_LABELS = { feature:'功能开发', bug:'Bug修复', doc:'文档编写', test:'功能测试', perf:'性能优化', comm:'沟通协调', other:'其他' };
const TASK_TYPE_COLORS = { feature:'#dbeafe:#1e40af', bug:'#fee2e2:#9b1c1c', doc:'#e8f5ee:#2d6a4f', test:'#fef3c7:#92400e', perf:'#ede9fe:#5b21b6', comm:'#e0f2fe:#0369a1', other:'#f1f5f9:#475569' };
const ROLE_LABELS = { product_design:'产品设计', frontend:'前端', backend:'后端', testing:'测试' };
const SUB_STATUS_LABELS = { pending_design:'待产品设计', pending_dev:'待开发', developing:'开发中', integration:'联调中', testing:'测试中', done:'已完成' };

// ======== IDB HELPERS ========
function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function idbGet(key) {
  try {
    const idb = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = idb.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error);
    });
  } catch { return undefined; }
}
async function idbSet(key, value) {
  try {
    const idb = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = idb.transaction(IDB_STORE, 'readwrite');
      const req = tx.objectStore(IDB_STORE).put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
  } catch {}
}

// ======== FILE SYSTEM ACCESS ========
async function tryRestoreFolder() {
  if (!FSA_AVAILABLE) return;
  try {
    const stored = await idbGet('rootFolderHandle');
    if (!stored) return;
    const perm = await stored.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      dataFolderHandle = await getOrCreateProjectsSubfolder(stored);
      updateFolderUI(true);
      return;
    }
    const req = await stored.requestPermission({ mode: 'readwrite' });
    if (req === 'granted') {
      dataFolderHandle = await getOrCreateProjectsSubfolder(stored);
      updateFolderUI(true);
    }
  } catch {}
}
async function getOrCreateProjectsSubfolder(rootHandle) {
  dataRootHandle = await rootHandle.getDirectoryHandle('data', { create: true });
  return await dataRootHandle.getDirectoryHandle('projects', { create: true });
}
async function selectDataFolder() {
  if (!FSA_AVAILABLE) { showToast('您的浏览器不支持文件系统访问 API', 'error'); return; }
  try {
    const rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('rootFolderHandle', rootHandle);
    dataFolderHandle = await getOrCreateProjectsSubfolder(rootHandle);
    updateFolderUI(true);
    await loadFromFS();
    await loadPeopleFromFS();
    showToast('数据文件夹已连接', 'success');
    renderCurrentView();
  } catch (e) {
    if (e.name !== 'AbortError') showToast('选择文件夹失败：' + e.message, 'error');
  }
}
async function loadFromFS() {
  if (!dataFolderHandle) { projects = []; return; }
  projects = [];
  try {
    for await (const [name, handle] of dataFolderHandle.entries()) {
      if (name.startsWith('project_') && name.endsWith('.json') && handle.kind === 'file') {
        try {
          const file = await handle.getFile();
          const text = await file.text();
          const rec = JSON.parse(text);
          projects.push(rec);
        } catch {}
      }
    }
  } catch {}
  projects.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
}
async function saveProjectToFS(proj) {
  if (!dataFolderHandle) { showToast('请先选择数据文件夹', 'error'); throw new Error('no folder'); }
  try {
    const fh = await dataFolderHandle.getFileHandle(`project_${proj.id}.json`, { create: true });
    const writable = await fh.createWritable();
    await writable.write(JSON.stringify(proj, null, 2));
    await writable.close();
  } catch (e) { showToast('保存失败：' + e.message, 'error'); throw e; }
}
async function deleteProjectFromFS(proj) {
  if (!dataFolderHandle) return;
  try { await dataFolderHandle.removeEntry(`project_${proj.id}.json`); } catch {}
}
function updateFolderUI(connected) {
  const banner = document.getElementById('folder-banner');
  const statusText = document.getElementById('folder-status-text');
  const connectBtn = document.getElementById('connect-folder-btn-wrap');
  if (connected) {
    banner.style.display = 'none';
    statusText.textContent = '✓ JSON 文件已连接';
    statusText.style.color = 'rgba(255,255,255,0.85)';
    if (connectBtn) connectBtn.style.display = 'none';
  } else {
    banner.style.display = 'none';
    statusText.textContent = '未连接数据文件夹';
    statusText.style.color = 'rgba(255,255,255,0.5)';
    if (connectBtn) connectBtn.style.display = 'block';
  }
}

// ======== PEOPLE FILE SYSTEM ========
async function loadPeopleFromFS() {
  if (!dataRootHandle) { people = []; return; }
  try {
    const fh = await dataRootHandle.getFileHandle('people.json', { create: false });
    const file = await fh.getFile();
    const text = await file.text();
    people = JSON.parse(text);
    if (!Array.isArray(people)) people = [];
  } catch { people = []; }
}
async function savePeopleToFS() {
  if (!dataRootHandle) return;
  try {
    const fh = await dataRootHandle.getFileHandle('people.json', { create: true });
    const writable = await fh.createWritable();
    await writable.write(JSON.stringify(people, null, 2));
    await writable.close();
  } catch (e) { showToast('保存人员数据失败：' + e.message, 'error'); }
}

// ======== MULTI-SELECT ========
function toggleMs(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const isOpen = wrap.classList.contains('open');
  // Close all other open multi-selects
  document.querySelectorAll('.ms-wrap.open').forEach(w => w.classList.remove('open'));
  if (!isOpen) wrap.classList.add('open');
}
function initMs(wrapperId, options, selectedIds, placeholder) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const dropdown = document.getElementById(wrapperId + '-dropdown');
  if (!dropdown) return;
  dropdown.innerHTML = options.map(opt => `
    <label class="ms-option">
      <input type="checkbox" value="${opt.id}" ${selectedIds.includes(opt.id)?'checked':''} onchange="updateMsTags('${wrapperId}','${placeholder}')">
      ${escHtml(opt.name)}
    </label>`).join('');
  updateMsTags(wrapperId, placeholder);
}
function updateMsTags(wrapperId, placeholder) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const tagsEl = document.getElementById(wrapperId + '-tags');
  const checked = Array.from(wrap.querySelectorAll('input[type=checkbox]:checked'));
  if (!checked.length) {
    tagsEl.innerHTML = `<span class="ms-placeholder">${placeholder || '请选择'}</span>`;
  } else {
    tagsEl.innerHTML = checked.map(cb => {
      const p = people.find(x => x.id === cb.value);
      return `<span class="ms-tag">${escHtml(p ? p.name : cb.value)}</span>`;
    }).join('');
  }
}
function getMsValues(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return [];
  return Array.from(wrap.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
}
// Close multi-selects when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-wrap.open').forEach(w => w.classList.remove('open'));
  }
});

// ======== DATA HELPERS ========
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
async function saveProject(proj) {
  proj.updatedAt = new Date().toISOString();
  const idx = projects.findIndex(p => p.id === proj.id);
  if (idx >= 0) projects[idx] = proj; else projects.unshift(proj);
  await saveProjectToFS(proj);
}
async function deleteProject(proj) {
  projects = projects.filter(p => p.id !== proj.id);
  await deleteProjectFromFS(proj);
}
function getProject(id) { return projects.find(p => p.id === id); }
function getAllTasks() {
  const tasks = [];
  for (const proj of projects) {
    for (const t of (proj.tasks || [])) tasks.push({ ...t, _projectName: proj.name, _projectId: proj.id });
    for (const sp of (proj.subProjects || [])) {
      for (const t of (sp.tasks || [])) tasks.push({ ...t, _projectName: proj.name + ' / ' + sp.name, _projectId: proj.id, _subProjectId: sp.id });
    }
  }
  return tasks;
}
function calcRiskLevel(impact, prob) {
  const v = { high: 3, medium: 2, low: 1 };
  const s = v[impact] * v[prob];
  if (s >= 6) return 'high';
  if (s >= 3) return 'medium';
  return 'low';
}
function getEffectiveProgress(proj) {
  if (proj.subProjects && proj.subProjects.length > 0) {
    const sum = proj.subProjects.reduce((a, sp) => a + getSpProgress(sp), 0);
    return Math.round(sum / proj.subProjects.length);
  }
  return proj.progress || 0;
}
function isOverdue(dueDateStr) {
  if (!dueDateStr) return false;
  return new Date(dueDateStr + 'T23:59:59') < new Date();
}

// ======== VIEW NAVIGATION ========
function showView(view) {
  if (view !== 'detail') currentProjectId = null;
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const viewEl = document.getElementById('view-' + view);
  if (viewEl) viewEl.classList.add('active');
  const navEl = document.querySelector(`[data-view="${view}"]`);
  if (navEl) navEl.classList.add('active');
  const breadcrumb = document.getElementById('breadcrumb');
  breadcrumb.style.display = 'none';
  const newBtn = document.getElementById('topbar-new-btn');
  if (view === 'people') {
    newBtn.style.display = '';
    newBtn.onclick = () => openPersonModal(null);
    newBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> 新建人员';
  } else {
    newBtn.style.display = '';
    newBtn.onclick = () => openProjectForm(null);
    newBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> 新建项目';
  }
  const titles = { dashboard:'总览', list:'项目列表', detail:'项目详情', board:'任务看板', risks:'风险管理', people:'人员管理' };
  document.getElementById('topbar-title').textContent = titles[view] || '';
  renderCurrentView();
}
function showDetail(projectId) {
  currentProjectId = projectId;
  currentView = 'detail';
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-detail').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('topbar-title').textContent = '';
  const proj = getProject(projectId);
  if (!proj) return;
  const breadcrumb = document.getElementById('breadcrumb');
  breadcrumb.style.display = 'flex';
  breadcrumb.innerHTML = `<span class="breadcrumb-link" onclick="showView('list')">项目列表</span><span class="breadcrumb-sep">/</span><span>${escHtml(proj.name)}</span>`;
  const newBtn = document.getElementById('topbar-new-btn');
  newBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg> 编辑项目';
  newBtn.onclick = () => openProjectForm(projectId);
  renderDetail(projectId);
}
function renderCurrentView() {
  if (currentView === 'dashboard') renderDashboard();
  else if (currentView === 'list') renderList();
  else if (currentView === 'detail' && currentProjectId) renderDetail(currentProjectId);
  else if (currentView === 'board') renderBoard();
  else if (currentView === 'risks') renderRisksView();
  else if (currentView === 'people') renderPeopleView();
}

// ======== DASHBOARD ========
function renderDashboard() {
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();
  const allTasks = getAllTasks();
  const total = projects.length;
  const active = projects.filter(p => p.status === 'active').length;
  const overdueTasks = allTasks.filter(t => t.status !== 'done' && isOverdue(t.dueDate));
  const allRisks = projects.flatMap(p => (p.risks || []).map(r => ({ ...r, _projectName: p.name, _projectId: p.id })));
  const highRisk = allRisks.filter(r => calcRiskLevel(r.impact, r.probability) === 'high' && r.status !== 'closed');
  const statsHtml = `
    <div class="stat-card"><div class="stat-label">全部项目</div><div class="stat-value">${total}</div><div class="stat-sub">${active} 个进行中</div></div>
    <div class="stat-card"><div class="stat-label">高风险项目</div><div class="stat-value" style="color:var(--red)">${highRisk.length}</div><div class="stat-sub">待处理风险</div></div>
    <div class="stat-card"><div class="stat-label">逾期任务</div><div class="stat-value" style="color:var(--amber)">${overdueTasks.length}</div><div class="stat-sub">需立即关注</div></div>
    <div class="stat-card"><div class="stat-label">已完成项目</div><div class="stat-value" style="color:var(--green)">${projects.filter(p=>p.status==='done').length}</div><div class="stat-sub">共 ${total} 个</div></div>
  `;
  document.getElementById('dash-stats').innerHTML = statsHtml;

  const dueSoon = projects.filter(p => {
    if (!p.dueDate || p.status === 'done') return false;
    const d = new Date(p.dueDate + 'T23:59:59');
    return d.getFullYear() === thisYear && d.getMonth() === thisMonth;
  });
  const recentActive = [...projects].filter(p => p.status === 'active').sort((a,b) => new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0, 5);

  const dueSoonHtml = dueSoon.length ? dueSoon.map(p => `
    <div class="dash-list-item" onclick="showDetail('${p.id}')">
      <span class="badge badge-status-${p.status}">${STATUS_LABELS[p.status]}</span>
      <span class="dash-list-item-name">${escHtml(p.name)}</span>
      <span class="dash-list-item-meta">${p.dueDate}</span>
    </div>`).join('') : '<div class="dash-empty">本月无到期项目</div>';

  const highRiskHtml = highRisk.length ? highRisk.slice(0,5).map(r => `
    <div class="dash-list-item" onclick="showDetail('${r._projectId}')">
      <span class="badge badge-risk-high">高风险</span>
      <span class="dash-list-item-name">${escHtml(r.description)}</span>
      <span class="dash-list-item-meta">${escHtml(r._projectName)}</span>
    </div>`).join('') : '<div class="dash-empty">暂无高风险项</div>';

  const recentHtml = recentActive.length ? recentActive.map(p => `
    <div class="dash-list-item" onclick="showDetail('${p.id}')">
      ${progressBadge(getEffectiveProgress(p))}
      <span class="dash-list-item-name">${escHtml(p.name)}</span>
      <span class="badge badge-priority-${p.priority}">${PRIORITY_LABELS[p.priority]}</span>
    </div>`).join('') : '<div class="dash-empty">暂无进行中项目</div>';

  const overdueHtml = overdueTasks.length ? overdueTasks.slice(0,5).map(t => `
    <div class="dash-list-item" onclick="showDetail('${t._projectId}')">
      <span class="badge badge-priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span>
      <span class="dash-list-item-name">${escHtml(t.title)}</span>
      <span class="dash-list-item-meta" style="color:var(--red)">${t.dueDate}</span>
    </div>`).join('') : '<div class="dash-empty">暂无逾期任务</div>';

  document.getElementById('dash-grid').innerHTML = `
    <div class="dash-card"><div class="dash-card-title">本月到期项目 <span class="badge badge-status-active">${dueSoon.length}</span></div><div class="dash-list">${dueSoonHtml}</div></div>
    <div class="dash-card"><div class="dash-card-title">高风险项目 <span class="badge badge-risk-high">${highRisk.length}</span></div><div class="dash-list">${highRiskHtml}</div></div>
    <div class="dash-card"><div class="dash-card-title">最近活跃项目</div><div class="dash-list">${recentHtml}</div></div>

function taskCardHtml(t, projectId, showSp) {
  const dueCls = t.dueDate && isOverdue(t.dueDate) && t.status !== 'done' ? 'overdue' : '';
  const spBadge = showSp && t._spName ? `<span class="task-card-project">${escHtml(t._spName)}</span>` : '';
  const projBadge = !showSp && t._projectName ? `<span class="task-card-project">${escHtml(t._projectName)}</span>` : '';
  const typeLabel = TASK_TYPE_LABELS[t.taskType] || '';
  const typeColors = t.taskType && TASK_TYPE_COLORS[t.taskType] ? TASK_TYPE_COLORS[t.taskType].split(':') : null;
  const typeBadge = typeLabel ? `<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:${typeColors?typeColors[0]:'var(--surface2)'};color:${typeColors?typeColors[1]:'var(--text3)'}">${typeLabel}</span>` : '';
  const assigneeNames = (t.assignees || []).map(id => getPersonName(id)).filter(Boolean);
  const assigneeBadge = assigneeNames.length ? `<span class="task-card-project" title="${escHtml(assigneeNames.join('、'))}">👤 ${escHtml(assigneeNames.slice(0,2).join('、'))}${assigneeNames.length>2?` +${assigneeNames.length-2}`:''}</span>` : '';
  return `
    <div class="task-card" draggable="true" id="task-${t.id}"
      ondragstart="dragStart(event,'${t.id}','${projectId || t._projectId}')"
      onclick="openTaskForm('${projectId || t._projectId}', '${t.id}', '${t.status}')">
      <div class="task-card-title">${escHtml(t.title)}</div>
      <div class="task-card-meta">
        ${typeBadge}
        <span class="badge badge-priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span>
        ${spBadge}${projBadge}
        ${assigneeBadge}
        ${t.dueDate ? `<span class="task-card-due ${dueCls}">${t.dueDate}</span>` : ''}
      </div>
    </div>`;
}

// ======== DRAG & DROP ========
let dragTaskId = null;
let dragTaskProjectId = null;

function dragStart(e, taskId, projectId) {
  dragTaskId = taskId;
  dragTaskProjectId = projectId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.getElementById('task-' + taskId); if (el) el.classList.add('dragging'); }, 0);
}
function dragOver(e, status, projectId) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
async function drop(e, newStatus, projectId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragTaskId) return;
  await updateTaskStatus(dragTaskProjectId, dragTaskId, newStatus);
  dragTaskId = null;
  dragTaskProjectId = null;
  renderCurrentView();
}
async function updateTaskStatus(projectId, taskId, newStatus) {
  const proj = getProject(projectId);
  if (!proj) return;
  let found = false;
  for (const t of (proj.tasks || [])) { if (t.id === taskId) { t.status = newStatus; found = true; break; } }
  if (!found) {
    for (const sp of (proj.subProjects || [])) {
      for (const t of (sp.tasks || [])) { if (t.id === taskId) { t.status = newStatus; found = true; break; } }
      if (found) break;
    }
  }
  if (found) await saveProject(proj);
}

            <td><div class="risk-actions">
              <button class="icon-btn" onclick="openPersonModal('${p.id}')"><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
              <button class="icon-btn delete" onclick="deletePersonConfirm('${p.id}')"><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : '<div class="empty-state" style="padding:60px 0"><h3>暂无人员数据</h3><p>点击"新建人员"添加第一位成员</p></div>';
  const paginationHtml = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:16px">
      <span style="font-size:12px;color:var(--text3)">第 ${peopleCurrentPage} / ${totalPages} 页，共 ${total} 条</span>
      <button class="btn btn-sm" onclick="setPeoplePage(${peopleCurrentPage-1})" ${peopleCurrentPage<=1?'disabled':''}>上一页</button>
      <button class="btn btn-sm" onclick="setPeoplePage(${peopleCurrentPage+1})" ${peopleCurrentPage>=totalPages?'disabled':''}>下一页</button>
    </div>` : '';
  document.getElementById('people-content').innerHTML = `
    <div class="section-actions" style="margin-bottom:16px">
      <div class="section-title">人员列表（${total} 人）</div>
      <button class="btn btn-sm btn-primary" onclick="openPersonModal(null)">+ 新建人员</button>
    </div>
    <div style="overflow-x:auto">${tableHtml}</div>
    ${paginationHtml}`;
}
function setPeoplePage(p) {
  const totalPages = Math.max(1, Math.ceil(people.length / PEOPLE_PER_PAGE));
  if (p < 1 || p > totalPages) return;
  peopleCurrentPage = p;
  renderPeopleView();
}
function openPersonModal(personId) {
  editingPersonId = personId;
  const person = personId ? people.find(p => p.id === personId) : null;
  document.getElementById('people-modal-title').textContent = person ? '编辑人员' : '新建人员';
  document.getElementById('pf-name').value = person?.name || '';
  const roleKeys = ['product_design','frontend','backend','testing'];
  roleKeys.forEach(role => {
    const cb = document.getElementById(`pf-role-${role}`);
    if (cb) cb.checked = person ? (person.roles || []).includes(role) : false;
  });
  openModal('people-modal');
}
async function savePersonForm() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { showToast('请填写姓名', 'error'); return; }
  const roleKeys = ['product_design','frontend','backend','testing'];
  const roles = roleKeys.filter(r => document.getElementById(`pf-role-${r}`)?.checked);
  if (editingPersonId) {
    const idx = people.findIndex(p => p.id === editingPersonId);
    if (idx >= 0) people[idx] = { ...people[idx], name, roles };
  } else {
    people.push({ id: genId(), name, roles, createdAt: new Date().toISOString() });
  }
  await savePeopleToFS();
  closeModal('people-modal');
  showToast(editingPersonId ? '人员已更新' : '人员已添加', 'success');
  renderPeopleView();
}
function deletePersonConfirm(personId) {
  const person = people.find(p => p.id === personId);
  document.getElementById('confirm-title').textContent = '确认删除人员';
  document.getElementById('confirm-msg').textContent = `确定删除人员「${person?.name || ''}」吗？此操作无法撤销。`;
  pendingConfirmFn = async () => {
    people = people.filter(p => p.id !== personId);
    await savePeopleToFS();
    showToast('人员已删除', 'success');
    renderPeopleView();
  };
  openModal('confirm-modal');
}

// ======== PROJECT FORM ========
function openProjectForm(projectId) {
  editingProjectId = projectId;
  const proj = projectId ? getProject(projectId) : null;
  document.getElementById('project-modal-title').textContent = proj ? '编辑项目' : '新建项目';
  document.getElementById('project-modal-sub').textContent = proj ? '修改项目信息' : '填写项目基本信息';
  document.getElementById('f-name').value = proj?.name || '';
  document.getElementById('f-desc').value = proj?.description || '';
  document.getElementById('f-status').value = proj?.status || 'planning';
  document.getElementById('f-priority').value = proj?.priority || 'medium';
  document.getElementById('f-start').value = proj?.startDate || '';
  document.getElementById('f-due').value = proj?.dueDate || '';
  document.getElementById('f-completed').value = proj?.completedDate || '';
  const prog = proj?.progress || 0;
  document.getElementById('f-progress').value = prog;
  document.getElementById('f-progress-val').textContent = prog + '%';
  document.getElementById('f-tags').value = (proj?.tags||[]).join(', ');
  document.getElementById('f-notes').value = proj?.notes || '';
  // Initialize owner multi-select
  const selectedOwners = proj?.owners || (proj?.owner ? [proj.owner] : []);
  initMs('f-owner-ms', people.map(p=>({id:p.id,name:p.name})), selectedOwners, '选择负责人');
  openModal('project-modal');
}
async function saveProjectForm() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('请填写项目名称', 'error'); return; }
  const proj = editingProjectId ? { ...getProject(editingProjectId) } : {
    id: genId(), subProjects: [], risks: [], tasks: [], createdAt: new Date().toISOString()
  };
  proj.name = name;
  proj.description = document.getElementById('f-desc').value.trim();
  proj.status = document.getElementById('f-status').value;
  proj.priority = document.getElementById('f-priority').value;
  proj.owners = getMsValues('f-owner-ms');
  proj.owner = proj.owners.map(id => getPersonName(id)).join(', ');
  proj.startDate = document.getElementById('f-start').value;
  proj.dueDate = document.getElementById('f-due').value;
  proj.completedDate = document.getElementById('f-completed').value;
  proj.progress = parseInt(document.getElementById('f-progress').value) || 0;
  proj.tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  proj.notes = document.getElementById('f-notes').value.trim();
  await saveProject(proj);
  closeModal('project-modal');
  showToast(editingProjectId ? '项目已更新' : '项目已创建', 'success');
  if (editingProjectId) { showDetail(editingProjectId); } else renderList();
}

// ======== SUBPROJECT FORM ========
let subProjectFormProjectId = null;
function openSubProjectForm(projectId, subProjectId) {
  subProjectFormProjectId = projectId;
  editingSubProjectId = subProjectId;
  const proj = getProject(projectId);
  const sp = subProjectId ? (proj?.subProjects||[]).find(s=>s.id===subProjectId) : null;
  document.getElementById('subproject-modal-title').textContent = sp ? '编辑子项目' : '新建子项目';
  document.getElementById('sf-name').value = sp?.name || '';
  document.getElementById('sf-desc').value = sp?.description || '';
  document.getElementById('sf-status').value = sp?.status || 'pending_design';
  document.getElementById('sf-priority').value = sp?.priority || 'medium';
  document.getElementById('sf-start').value = sp?.startDate || '';
  document.getElementById('sf-due').value = sp?.dueDate || '';
  // Initialize role multi-selects and progress
  const roleKeys = ['product_design','frontend','backend','testing'];
  const placeholders = { product_design:'选择产品设计人员', frontend:'选择前端人员', backend:'选择后端人员', testing:'选择测试人员' };
  roleKeys.forEach(role => {
    const selected = sp?.owners ? (sp.owners[role] || []) : [];
    initMs(`sf-role-${role}-ms`, people.map(p=>({id:p.id,name:p.name})), selected, placeholders[role]);
    const pct = sp?.roleProgress ? (sp.roleProgress[role] || 0) : 0;
    const rangeEl = document.getElementById(`sf-prog-${role}`);
    const valEl = document.getElementById(`sf-prog-${role}-val`);
    if (rangeEl) rangeEl.value = pct;
    if (valEl) valEl.textContent = pct + '%';
  });
  openModal('subproject-modal');
}
async function saveSubProjectForm() {
  const name = document.getElementById('sf-name').value.trim();
  if (!name) { showToast('请填写子项目名称', 'error'); return; }
  const proj = getProject(subProjectFormProjectId);
  if (!proj) return;
  if (!proj.subProjects) proj.subProjects = [];
  const roleKeys = ['product_design','frontend','backend','testing'];
  const owners = {};
  const roleProgress = {};
  roleKeys.forEach(role => {
    owners[role] = getMsValues(`sf-role-${role}-ms`);
    roleProgress[role] = parseInt(document.getElementById(`sf-prog-${role}`)?.value) || 0;
  });
  const avgProgress = Math.round(Object.values(roleProgress).reduce((a,b)=>a+b,0)/roleKeys.length);
  if (editingSubProjectId) {
    const idx = proj.subProjects.findIndex(s=>s.id===editingSubProjectId);
    if (idx >= 0) {
      proj.subProjects[idx] = { ...proj.subProjects[idx],
        name, description: document.getElementById('sf-desc').value.trim(),
        status: document.getElementById('sf-status').value,
        priority: document.getElementById('sf-priority').value,
        owners, roleProgress, progress: avgProgress,
        startDate: document.getElementById('sf-start').value,
        dueDate: document.getElementById('sf-due').value };
    }
  } else {
    proj.subProjects.push({ id: genId(), name, description: document.getElementById('sf-desc').value.trim(),
      status: document.getElementById('sf-status').value, priority: document.getElementById('sf-priority').value,
      owners, roleProgress, progress: avgProgress,
      startDate: document.getElementById('sf-start').value,
      dueDate: document.getElementById('sf-due').value,
      tasks: [], createdAt: new Date().toISOString() });
  }
  await saveProject(proj);
  closeModal('subproject-modal');
  showToast('子项目已保存', 'success');
  renderDetail(subProjectFormProjectId);
}

// ======== RISK FORM ========
let riskFormProjectId = null;
function openRiskForm(projectId, riskId) {
  riskFormProjectId = projectId;
  editingRiskId = riskId;
  const proj = getProject(projectId);
  const risk = riskId ? (proj?.risks||[]).find(r=>r.id===riskId) : null;
  document.getElementById('risk-modal-title').textContent = risk ? '编辑风险' : '新建风险';
  document.getElementById('rf-desc').value = risk?.description || '';
  document.getElementById('rf-impact').value = risk?.impact || 'medium';
  document.getElementById('rf-probability').value = risk?.probability || 'medium';
  document.getElementById('rf-strategy').value = risk?.strategy || 'mitigate';
  document.getElementById('rf-status').value = risk?.status || 'pending';
  document.getElementById('rf-mitigation').value = risk?.mitigation || '';
  document.getElementById('rf-owner').value = risk?.owner || '';
  openModal('risk-modal');
}
async function saveRiskForm() {
  const desc = document.getElementById('rf-desc').value.trim();
  if (!desc) { showToast('请填写风险描述', 'error'); return; }
  const proj = getProject(riskFormProjectId);
  if (!proj) return;
  if (!proj.risks) proj.risks = [];
  const riskData = { id: editingRiskId || genId(), description: desc,
    impact: document.getElementById('rf-impact').value,
    probability: document.getElementById('rf-probability').value,
    strategy: document.getElementById('rf-strategy').value,
    status: document.getElementById('rf-status').value,
    mitigation: document.getElementById('rf-mitigation').value.trim(),
    owner: document.getElementById('rf-owner').value.trim() };
  if (editingRiskId) {
    const idx = proj.risks.findIndex(r=>r.id===editingRiskId);
    if (idx>=0) proj.risks[idx] = riskData;
  } else { proj.risks.push(riskData); }
  await saveProject(proj);
  closeModal('risk-modal');
  showToast('风险已保存', 'success');
  if (currentView === 'detail') renderDetail(riskFormProjectId);
  else renderRisksView();
}

// ======== TASK FORM ========
function openTaskForm(projectId, taskId, defaultStatus) {
  taskFormProjectId = projectId;
  editingTaskId = taskId;
  taskFormStatus = defaultStatus || 'todo';
  // Populate project dropdown
  const projSelect = document.getElementById('tf-project');
  projSelect.innerHTML = projects.map(p => `<option value="${p.id}" ${p.id===projectId?'selected':''}>${escHtml(p.name)}</option>`).join('');
  if (!projectId && projects.length) projSelect.value = projects[0].id;
  // Populate subproject dropdown based on selected project
  updateSubProjectOptions(projSelect.value, null);
  projSelect.onchange = () => updateSubProjectOptions(projSelect.value, null);
  // Fill existing task data
  let task = null;
  if (taskId && projectId) {
    const proj = getProject(projectId);
    task = (proj?.tasks||[]).find(t=>t.id===taskId) || proj?.subProjects?.flatMap(sp=>sp.tasks||[]).find(t=>t.id===taskId);
  }
  document.getElementById('task-modal-title').textContent = task ? '编辑任务' : '新建任务';
  document.getElementById('tf-title').value = task?.title || '';
  document.getElementById('tf-priority').value = task?.priority || 'medium';
  document.getElementById('tf-status').value = task?.status || defaultStatus || 'todo';
  document.getElementById('tf-due').value = task?.dueDate || '';
  document.getElementById('tf-desc').value = task?.description || '';
  document.getElementById('tf-type').value = task?.taskType || 'feature';
  initMs('tf-assignees-ms', people.map(p => ({ id: p.id, label: p.name })), task?.assignees || [], '选择负责人');
  if (task?.subProjectId) {
    updateSubProjectOptions(projectId, task.subProjectId);
  }
  openModal('task-modal');
}
function updateSubProjectOptions(projectId, selectedSpId) {
  const proj = getProject(projectId);
  const spSelect = document.getElementById('tf-subproject');
  spSelect.innerHTML = '<option value="">无（归属项目）</option>' + (proj?.subProjects||[]).map(sp => `<option value="${sp.id}" ${sp.id===selectedSpId?'selected':''}>${escHtml(sp.name)}</option>`).join('');
}
async function saveTaskForm() {
  const title = document.getElementById('tf-title').value.trim();
  if (!title) { showToast('请填写任务标题', 'error'); return; }
  const projId = document.getElementById('tf-project').value;
  const spId = document.getElementById('tf-subproject').value || null;
  const proj = getProject(projId);
  if (!proj) { showToast('请选择项目', 'error'); return; }
  const taskData = { id: editingTaskId || genId(), title,
    priority: document.getElementById('tf-priority').value,
    status: document.getElementById('tf-status').value,
    dueDate: document.getElementById('tf-due').value,
    description: document.getElementById('tf-desc').value.trim(),
    taskType: document.getElementById('tf-type').value,
    assignees: getMsValues('tf-assignees-ms'),
    subProjectId: spId, projectId: projId };
  // If editing, remove from old location first
  if (editingTaskId) {
    proj.tasks = (proj.tasks||[]).filter(t=>t.id!==editingTaskId);
    for (const sp of (proj.subProjects||[])) sp.tasks = (sp.tasks||[]).filter(t=>t.id!==editingTaskId);
  }
  if (spId) {
    const sp = (proj.subProjects||[]).find(s=>s.id===spId);
    if (sp) { if (!sp.tasks) sp.tasks=[]; sp.tasks.push(taskData); }
  } else { if (!proj.tasks) proj.tasks=[]; proj.tasks.push(taskData); }
  await saveProject(proj);
  closeModal('task-modal');
  showToast('任务已保存', 'success');
  renderCurrentView();
}

// ======== DELETE HELPERS ========
function askDeleteProject(projectId) {
  document.getElementById('confirm-title').textContent = '确认删除项目';
  document.getElementById('confirm-msg').textContent = '删除项目将同时删除其所有子项目、任务和风险，此操作无法撤销。';
  pendingConfirmFn = async () => {
    const proj = getProject(projectId);
    if (proj) await deleteProject(proj);
    showToast('项目已删除', 'success');
    showView('list');
  };
  openModal('confirm-modal');
}
function askDeleteSubProject(projectId, spId) {
  document.getElementById('confirm-title').textContent = '确认删除子项目';
  document.getElementById('confirm-msg').textContent = '删除后无法恢复，确定吗？';
  pendingConfirmFn = async () => {
    const proj = getProject(projectId);
    if (proj) { proj.subProjects = (proj.subProjects||[]).filter(s=>s.id!==spId); await saveProject(proj); }
    showToast('子项目已删除', 'success');
    renderDetail(projectId);
  };
  openModal('confirm-modal');
}
function askDeleteRisk(projectId, riskId) {
  document.getElementById('confirm-title').textContent = '确认删除风险';
  document.getElementById('confirm-msg').textContent = '删除后无法恢复，确定吗？';
  pendingConfirmFn = async () => {
    const proj = getProject(projectId);
    if (proj) { proj.risks = (proj.risks||[]).filter(r=>r.id!==riskId); await saveProject(proj); }
    showToast('风险已删除', 'success');
    if (currentView==='detail') renderDetail(projectId); else renderRisksView();
  };
  openModal('confirm-modal');
}
async function confirmAction() {
  closeModal('confirm-modal');
  if (pendingConfirmFn) { await pendingConfirmFn(); pendingConfirmFn = null; }
}

// ======== MODAL & TOAST ========
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ======== THEME ========
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-icon-sun').style.display = isDark ? 'none' : 'block';
  document.getElementById('theme-icon-moon').style.display = isDark ? 'block' : 'none';
}

// ======== UTILS ========
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ======== INIT ========
async function init() {
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('theme-icon-sun').style.display = savedTheme === 'dark' ? 'block' : 'none';
  document.getElementById('theme-icon-moon').style.display = savedTheme === 'dark' ? 'none' : 'block';
  await tryRestoreFolder();
  updateFolderUI(!!dataFolderHandle);
  await loadFromFS();
  await loadPeopleFromFS();
  renderDashboard();
}
init();
</script>
