<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0eeea;
  --border: rgba(30,30,30,0.1); --border2: rgba(30,30,30,0.18);
  --text: #1a1a1a; --text2: #5a5a5a; --text3: #999;
  --accent: #1F4E79; --accent2: #2E75B6; --accent-light: #e8f0f8; --accent-mid: #b8d0ea;
  --green: #2d6a4f; --green-bg: #e8f5ee;
  --amber: #92400e; --amber-bg: #fef3c7;
  --red: #9b1c1c; --red-bg: #fee2e2;
  --shadow: 0 2px 12px rgba(0,0,0,0.07); --shadow2: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px; --radius-sm: 8px;
  --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --surface2: #283548;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  --accent: #2563eb; --accent2: #60a5fa; --accent-light: #1e3252; --accent-mid: rgba(96,165,250,0.2);
  --green: #4ade80; --green-bg: #052e16;
  --amber: #fbbf24; --amber-bg: #1c1400;
  --red: #f87171; --red-bg: #2d0000;
  --shadow: 0 2px 12px rgba(0,0,0,0.4); --shadow2: 0 8px 32px rgba(0,0,0,0.5);
}
[data-theme="dark"] .sidebar { background: #1e3252; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; font-size: 14px; line-height: 1.6;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px; background: var(--accent); color: #fff;
  display: flex; flex-direction: column; position: fixed;
  top: 0; left: 0; height: 100vh; z-index: 100;
}
.sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.12); }
.sidebar-logo h1 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; color: #fff; }
.sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; letter-spacing: 0.8px; text-transform: uppercase; }
.sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
.nav-section-title { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.8px; text-transform: uppercase; padding: 8px 24px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 24px; cursor: pointer; color: rgba(255,255,255,0.65); font-size: 13px; transition: var(--transition); border-left: 3px solid transparent; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-item.active { color: #fff; background: rgba(255,255,255,0.12); border-left-color: rgba(255,255,255,0.7); }
.nav-icon { width: 16px; height: 16px; opacity: 0.9; flex-shrink: 0; }
.sidebar-switch { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.12); }
.switch-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius-sm); font-size: 12.5px; color: rgba(255,255,255,0.55); text-decoration: none; transition: var(--transition); cursor: pointer; }
.switch-item:hover { background: rgba(255,255,255,0.08); color: #fff; }

.main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: 17px; font-weight: 500; }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text); transition: var(--transition); font-weight: 500; }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #163d61; border-color: #163d61; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.theme-toggle { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
.theme-toggle:hover { background: var(--surface2); color: var(--text); }

.content { padding: 28px 32px; flex: 1; }

/* Knowledge List */
.kb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.kb-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; cursor: pointer;
  transition: var(--transition); position: relative;
}
.kb-card:hover { box-shadow: var(--shadow2); transform: translateY(-1px); border-color: var(--accent-mid); }
.kb-card-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
.kb-card-preview { font-size: 12.5px; color: var(--text2); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; min-height: 48px; line-height: 1.6; }
.kb-card-meta { display: flex; align-items: center; gap: 10px; margin-top: 12px; font-size: 11px; color: var(--text3); }
.kb-card-project { padding: 2px 8px; border-radius: 20px; background: var(--accent-light); color: var(--accent2); font-size: 10px; font-weight: 500; }
.kb-card-actions { position: absolute; top: 12px; right: 12px; display: none; gap: 4px; }
.kb-card:hover .kb-card-actions { display: flex; }
.icon-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn.delete:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }

/* Editor */
.editor-container { display: flex; flex-direction: column; height: calc(100vh - 130px); }
.editor-toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; flex-shrink: 0; }
.editor-toolbar input {
  flex: 1; font-size: 18px; font-weight: 500; font-family: inherit;
  border: none; background: transparent; color: var(--text); outline: none;
  padding: 4px 0;
}
.editor-body { display: flex; gap: 16px; flex: 1; min-height: 0; }
.editor-pane {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
}
.editor-pane-header {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 6px 0; margin-bottom: 8px; flex-shrink: 0;
}
.editor-textarea {
  flex: 1; width: 100%; resize: none; border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 16px; font-size: 13px;
  font-family: 'Consolas', 'Monaco', monospace; line-height: 1.7;
  background: var(--surface); color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.editor-textarea:focus { border-color: var(--accent2); }
.md-preview {
  flex: 1; overflow-y: auto; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px;
  background: var(--surface); font-size: 13.5px; line-height: 1.8;
}
.md-preview h1 { font-size: 22px; font-weight: 600; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
.md-preview h2 { font-size: 18px; font-weight: 600; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.md-preview h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; }
.md-preview h4 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; }
.md-preview p { margin: 0 0 10px; }
.md-preview ul, .md-preview ol { margin: 0 0 10px; padding-left: 24px; }
.md-preview li { margin: 4px 0; }
.md-preview code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'Consolas', 'Monaco', monospace; color: var(--red); }
.md-preview pre { background: var(--surface2); padding: 14px 16px; border-radius: var(--radius-sm); overflow-x: auto; margin: 0 0 12px; }
.md-preview pre code { background: none; padding: 0; color: var(--text); font-size: 12px; line-height: 1.6; }
.md-preview blockquote { border-left: 3px solid var(--accent-mid); padding: 8px 16px; margin: 0 0 12px; background: var(--accent-light); color: var(--text2); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.md-preview table { width: 100%; border-collapse: collapse; margin: 0 0 12px; font-size: 13px; }
.md-preview th, .md-preview td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
.md-preview th { background: var(--surface2); font-weight: 600; }
.md-preview hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.md-preview a { color: var(--accent2); text-decoration: underline; }
.md-preview img { max-width: 100%; border-radius: var(--radius-sm); }
.md-preview strong { font-weight: 600; }

/* Fullscreen preview */
.preview-container { height: calc(100vh - 130px); overflow-y: auto; }
.preview-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.preview-title { font-size: 22px; font-weight: 500; font-family: 'DM Serif Display', serif; flex: 1; }
.preview-meta { font-size: 12px; color: var(--text3); margin-bottom: 16px; display: flex; gap: 16px; }

/* Search */
.search-box { position: relative; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.search-box input { width: 100%; padding: 9px 14px 9px 36px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: var(--transition); }
.search-box input:focus { border-color: var(--accent2); }
.filter-select { padding: 9px 14px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; cursor: pointer; }

/* Empty state */
.empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-state h3 { font-size: 16px; font-weight: 400; margin-bottom: 8px; color: var(--text2); }
.empty-state p { font-size: 13px; margin-bottom: 20px; }

/* Views */
.view { display: none; animation: fadeIn 0.25s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Toast */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: 10px; font-size: 13px; color: #fff; animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 8px; font-weight: 500; }
.toast.info { background: rgba(31,78,121,0.95); }
.toast.success { background: rgba(45,106,79,0.95); }
.toast.error { background: rgba(155,28,28,0.95); }
.toast-exit { animation: toastOut 0.3s ease-in forwards; }
@keyframes toastIn { from { opacity:0; transform:translateX(40px) scale(0.95); } to { opacity:1; transform:translateX(0) scale(1); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateX(40px); } }

/* Confirm */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 400px; box-shadow: var(--shadow2); }
.modal h3 { font-size: 17px; font-weight: 500; margin-bottom: 10px; }
.modal p { font-size: 13.5px; color: var(--text2); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>知识库</h1>
      <p>Knowledge Base</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-title">项目</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-switch">
      <a class="switch-item" href="home.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        导航主页
      </a>
      <a class="switch-item" href="kanban.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        项目看板
      </a>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="topbar-title">知识库</span>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
          <svg id="theme-icon-sun" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5" stroke-width="2"/><path stroke-linecap="round" stroke-width="2" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="btn btn-primary" id="btn-new" onclick="createKB()">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          新建文档
        </button>
      </div>
    </div>

    <div class="content">
      <!-- List View -->
      <div id="view-list" class="view active">
        <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center">
          <div class="search-box" style="flex:1">
            <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" placeholder="搜索知识库..." id="search-input" oninput="renderList()">
          </div>
        </div>
        <div id="kb-list-container"></div>
      </div>

      <!-- Edit View -->
      <div id="view-edit" class="view">
        <div class="editor-container">
          <div class="editor-toolbar">
            <button class="btn btn-sm" onclick="cancelEdit()">← 返回</button>
            <input type="text" id="edit-title" placeholder="输入文档标题...">
            <select class="filter-select" id="edit-project" style="min-width:140px"></select>
            <button class="btn btn-sm btn-primary" onclick="saveKB()">
              <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              保存
            </button>
          </div>
          <div class="editor-body">
            <div class="editor-pane">
              <div class="editor-pane-header">Markdown 编辑</div>
              <textarea class="editor-textarea" id="edit-content" placeholder="使用 Markdown 格式编写内容..." oninput="updatePreview()"></textarea>
            </div>
            <div class="editor-pane">
              <div class="editor-pane-header">实时预览</div>
              <div class="md-preview" id="edit-preview"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Detail View -->
      <div id="view-detail" class="view">
        <div class="preview-container">
          <div class="preview-header">
            <button class="btn btn-sm" onclick="showView('list')">← 返回</button>
            <span class="preview-title" id="detail-title"></span>
            <button class="btn btn-sm" onclick="editCurrentKB()">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteCurrentKB()">删除</button>
          </div>
          <div class="preview-meta" id="detail-meta"></div>
          <div class="md-preview" id="detail-content"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h3 id="confirm-title">确认删除</h3>
    <p id="confirm-msg">此操作无法撤销，确定继续吗？</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirm-ok-btn" onclick="doConfirm()">确认删除</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ======== STATE ========
let projects = [];
let allKBItems = []; // [{...kb, _projectId, _projectName}]
let currentProjectId = null; // null = all projects
let currentView = 'list';
let editingKBId = null;
let viewingKBId = null;
let pendingConfirmFn = null;

// ======== UTILS ========
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ======== THEME ========
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? '' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon();
}
function updateThemeIcon() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-icon-sun').style.display = dark ? 'block' : 'none';
  document.getElementById('theme-icon-moon').style.display = dark ? 'none' : 'block';
}

// ======== TOAST ========
function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('toast-exit'); t.addEventListener('animationend', () => t.remove()); }, 2800);
}

// ======== CONFIRM ========
function showConfirm(title, msg, fn) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  pendingConfirmFn = fn;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-modal').classList.remove('open'); pendingConfirmFn = null; }
function doConfirm() { if (pendingConfirmFn) pendingConfirmFn(); closeConfirm(); }

// ======== DATA ========
async function loadProjects() {
  if (window.electronAPI?.readProjects) {
    projects = await window.electronAPI.readProjects();
    if (!Array.isArray(projects)) projects = [];
  }
}

async function loadAllKB() {
  allKBItems = [];
  for (const proj of projects) {
    if (window.electronAPI?.readKnowledgeList) {
      const items = await window.electronAPI.readKnowledgeList(proj.id);
      for (const item of items) {
        allKBItems.push({ ...item, _projectId: proj.id, _projectName: proj.name });
      }
    }
  }
  allKBItems.sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));
}

// ======== SIDEBAR ========
function renderSidebar() {
  const el = document.getElementById('sidebar-projects');
  let html = `<div class="nav-item ${!currentProjectId?'active':''}" onclick="selectProject(null)">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
    全部项目
  </div>`;
  for (const proj of projects) {
    const count = allKBItems.filter(k => k._projectId === proj.id).length;
    html += `<div class="nav-item ${currentProjectId===proj.id?'active':''}" onclick="selectProject('${proj.id}')" title="${escHtml(proj.name)}">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      ${escHtml(proj.name)} (${count})
    </div>`;
  }
  el.innerHTML = html;
}

function selectProject(projectId) {
  currentProjectId = projectId;
  renderSidebar();
  if (currentView === 'list') renderList();
  document.getElementById('topbar-title').textContent = projectId
    ? (projects.find(p=>p.id===projectId)?.name || '知识库') + ' - 知识库'
    : '知识库';
}

// ======== VIEWS ========
function showView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  document.getElementById('btn-new').style.display = view === 'list' ? '' : 'none';
  if (view === 'list') {
    document.getElementById('topbar-title').textContent = currentProjectId
      ? (projects.find(p=>p.id===currentProjectId)?.name || '') + ' - 知识库'
      : '知识库';
  }
}

// ======== LIST ========
function renderList() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  let items = currentProjectId
    ? allKBItems.filter(k => k._projectId === currentProjectId)
    : allKBItems;
  if (q) items = items.filter(k => k.title.toLowerCase().includes(q) || (k.content||'').toLowerCase().includes(q));

  const container = document.getElementById('kb-list-container');
  if (!items.length) {
    container.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="opacity:0.3"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <h3>暂无知识库文档</h3>
      <p>点击"新建文档"开始记录知识</p>
    </div>`;
    return;
  }

  container.innerHTML = `<div class="kb-grid">${items.map(k => {
    const preview = (k.content || '').replace(/[#*`>\[\]()_~|]/g, '').slice(0, 120);
    const date = k.updatedAt || k.createdAt;
    return `<div class="kb-card" onclick="openKB('${k._projectId}','${k.id}')">
      <div class="kb-card-actions" onclick="event.stopPropagation()">
        <button class="icon-btn" onclick="editKB('${k._projectId}','${k.id}')" title="编辑">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
        <button class="icon-btn delete" onclick="deleteKB('${k._projectId}','${k.id}','${escHtml(k.title)}')" title="删除">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
      <div class="kb-card-title">${escHtml(k.title)}</div>
      <div class="kb-card-preview">${escHtml(preview)}</div>
      <div class="kb-card-meta">
        <span class="kb-card-project">${escHtml(k._projectName)}</span>
        <span>${date ? new Date(date).toLocaleDateString('zh-CN') : ''}</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ======== OPEN / VIEW ========
function openKB(projectId, kbId) {
  viewingKBId = kbId;
  const kb = allKBItems.find(k => k.id === kbId && k._projectId === projectId);
  if (!kb) return;

  document.getElementById('detail-title').textContent = kb.title;
  document.getElementById('detail-meta').innerHTML = `
    <span>项目：${escHtml(kb._projectName)}</span>
    <span>更新：${new Date(kb.updatedAt || kb.createdAt).toLocaleString('zh-CN')}</span>
  `;
  document.getElementById('detail-content').innerHTML = renderMarkdown(kb.content || '');
  showView('detail');
  document.getElementById('topbar-title').textContent = kb.title;
}

function editCurrentKB() {
  const kb = allKBItems.find(k => k.id === viewingKBId);
  if (kb) editKB(kb._projectId, kb.id);
}

function deleteCurrentKB() {
  const kb = allKBItems.find(k => k.id === viewingKBId);
  if (kb) deleteKB(kb._projectId, kb.id, kb.title);
}

// ======== CREATE / EDIT ========
function createKB() {
  editingKBId = null;
  document.getElementById('edit-title').value = '';
  document.getElementById('edit-content').value = '';
  document.getElementById('edit-preview').innerHTML = '';
  populateProjectSelect(currentProjectId);
  showView('edit');
  document.getElementById('topbar-title').textContent = '新建文档';
  document.getElementById('edit-title').focus();
}

function editKB(projectId, kbId) {
  const kb = allKBItems.find(k => k.id === kbId && k._projectId === projectId);
  if (!kb) return;
  editingKBId = kbId;
  document.getElementById('edit-title').value = kb.title;
  document.getElementById('edit-content').value = kb.content || '';
  populateProjectSelect(projectId);
  updatePreview();
  showView('edit');
  document.getElementById('topbar-title').textContent = '编辑：' + kb.title;
}

function populateProjectSelect(selectedId) {
  const sel = document.getElementById('edit-project');
  sel.innerHTML = projects.map(p =>
    `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${escHtml(p.name)}</option>`
  ).join('');
}

function cancelEdit() {
  if (editingKBId && viewingKBId === editingKBId) {
    showView('detail');
  } else {
    showView('list');
    renderList();
  }
}

async function saveKB() {
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { showToast('请输入文档标题', 'error'); return; }
  const content = document.getElementById('edit-content').value;
  const projectId = document.getElementById('edit-project').value;
  if (!projectId) { showToast('请选择所属项目', 'error'); return; }

  const now = new Date().toISOString();

  if (editingKBId) {
    // Find existing - might be in a different project
    const existing = allKBItems.find(k => k.id === editingKBId);
    if (existing && existing._projectId !== projectId) {
      // Delete from old project
      await window.electronAPI.deleteKnowledge(existing._projectId, editingKBId);
    }
    const kb = { id: editingKBId, title, content, updatedAt: now, createdAt: existing?.createdAt || now };
    await window.electronAPI.saveKnowledge(projectId, kb);
  } else {
    const kb = { id: genId(), title, content, createdAt: now, updatedAt: now };
    await window.electronAPI.saveKnowledge(projectId, kb);
  }

  await loadAllKB();
  renderSidebar();
  showToast(editingKBId ? '文档已更新' : '文档已创建', 'success');
  showView('list');
  renderList();
}

// ======== DELETE ========
function deleteKB(projectId, kbId, title) {
  showConfirm('确认删除', `确定删除文档「${title}」吗？此操作不可恢复。`, async () => {
    await window.electronAPI.deleteKnowledge(projectId, kbId);
    await loadAllKB();
    renderSidebar();
    showToast('文档已删除', 'success');
    if (currentView === 'detail') showView('list');
    renderList();
  });
}

// ======== PREVIEW ========
function updatePreview() {
  const md = document.getElementById('edit-content').value;
  document.getElementById('edit-preview').innerHTML = renderMarkdown(md);
}

// ======== SIMPLE MARKDOWN RENDERER ========
function renderMarkdown(md) {
  if (!md) return '<p style="color:var(--text3)">（空文档）</p>';

  let html = escHtml(md);

  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${code.trim()}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');

  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Strikethrough
  html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Auto-link URLs
  html = html.replace(/(^|[^"'>])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');

  // Images
  html = html.replace(/!&lt;img&gt;\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
    const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Unordered lists
  html = html.replace(/(^- .+$(\n- .+$)*)/gm, match => {
    const items = match.split('\n').map(line => `<li>${line.replace(/^- /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });

  // Ordered lists
  html = html.replace(/(^\d+\. .+$(\n\d+\. .+$)*)/gm, match => {
    const items = match.split('\n').map(line => `<li>${line.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  // Paragraphs - wrap remaining text lines
  html = html.replace(/^(?!<[a-z])((?!<\/)[^\n]+)$/gm, '<p>$1</p>');

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

// ======== KEYBOARD ========
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirm-modal').classList.contains('open')) {
      closeConfirm();
    } else if (currentView === 'edit') {
      cancelEdit();
    } else if (currentView === 'detail') {
      showView('list');
      renderList();
    }
  }
  // Ctrl+S to save
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && currentView === 'edit') {
    e.preventDefault();
    saveKB();
  }
});

// ======== INIT ========
async function init() {
  const t = localStorage.getItem('theme') || '';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeIcon();
  await loadProjects();
  await loadAllKB();
  renderSidebar();
  renderList();
}
init();
</script>
</body>
</html>
